<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="robots" content="noindex, nofollow">
<meta name="referrer" content="no-referrer">
<meta name="theme-color" content="#1e3a5f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="VetFlowCare">
<title>VetFlowCare Pro - Gestão Veterinária</title>
<link rel="icon" href="logo.jpg">
<link rel="apple-touch-icon" href="logo.jpg">
<link rel="manifest" href="manifest.json">
<style>
:root{
  --primary:#2DC0AE; --dark:#1E3A6E; --accent:#FF8C69;
  --bg:#EDF8F7; --surface:#FFFFFF; --text:#1A2F5A; --muted:#6B7A8D;
  --border:#D5EBE9; --success:#2DB37A; --warning:#F0A500; --danger:#E05252;
  --vac:#4E8EAC; --vacbg:#EEF4FA; --med:#2DB37A; --medbg:#EBF8F2;
  --vet:#E05252; --vetbg:#FDEEEE; --rx:#7C5CE4; --rxbg:#F3F0FD;
  --shadow:0 2px 10px rgba(26,47,90,.06);
}
body.dark{
  --bg:#0F1B2E; --surface:#1A2A44; --text:#E8F0F5; --muted:#8CA0B8;
  --border:#2A3D5C; --vacbg:#1E3350; --medbg:#16362C; --vetbg:#3A2028; --rxbg:#2A2450;
  --shadow:0 2px 10px rgba(0,0,0,.3);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,'Segoe UI',Inter,Roboto,sans-serif;background:var(--bg);color:var(--text);max-width:480px;margin:0 auto;min-height:100vh;padding-bottom:76px}
button{font-family:inherit;cursor:pointer;border:none}
input,select,textarea{font-family:inherit;width:100%;padding:12px 14px;border-radius:12px;border:1.5px solid var(--border);font-size:15px;background:var(--surface);color:var(--text);outline:none}
input:focus,select:focus,textarea:focus{border-color:var(--primary)}
label{display:block;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin:12px 0 5px}
h2{font-size:20px;font-weight:900;letter-spacing:-.3px}
.hidden{display:none!important}
#splash{position:fixed;inset:0;background:linear-gradient(160deg,#1E3A6E 0%,#163260 55%,#2DC0AE 100%);z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px;text-align:center}
#splash img{width:150px;height:150px;border-radius:30px;background:#fff;padding:10px;object-fit:contain;box-shadow:0 20px 60px rgba(0,0,0,.35)}
#splash .wm{margin-top:24px;font-size:36px;font-weight:900;letter-spacing:-1px}
#splash .wm .v{color:#fff}.wm .f{color:#2DC0AE}
#splash .care{font-family:Georgia,serif;font-style:italic;font-size:22px;color:#2DC0AE;margin-top:-4px}
#splash .pro{background:rgba(255,255,255,.15);color:#fff;font-size:11px;font-weight:800;letter-spacing:2px;padding:4px 14px;border-radius:14px;margin-top:10px}
#splash .tag{color:rgba(255,255,255,.55);font-size:11px;letter-spacing:2.5px;font-weight:600;margin-top:12px}
#splash button{margin-top:40px;width:100%;max-width:320px;background:#2DC0AE;color:#fff;padding:16px;border-radius:26px;font-size:16px;font-weight:800;box-shadow:0 8px 32px rgba(45,192,174,.5)}
#splash .sub{color:rgba(255,255,255,.4);font-size:11px;margin-top:12px}
header{background:linear-gradient(145deg,var(--dark) 0%,#1a3060 60%,rgba(45,192,174,.75) 100%);padding:16px 16px 20px;color:#fff;border-radius:0 0 24px 24px}
.topbar{display:flex;align-items:center;gap:10px}
.topbar img{width:40px;height:40px;border-radius:10px;background:#fff;padding:3px;object-fit:contain}
.topbar .wm{font-weight:900;font-size:19px;letter-spacing:-.4px}
.topbar .wm .f{color:#7FE8DB}
.topbar .care{font-family:Georgia,serif;font-style:italic;font-size:12px;color:#7FE8DB;margin-top:-3px}
.topbar .spacer{flex:1}
.profile-chip{background:rgba(255,255,255,.15);border:1.5px solid rgba(255,255,255,.3);color:#fff;border-radius:20px;padding:6px 12px;font-size:12px;font-weight:700;display:flex;align-items:center;gap:5px;max-width:150px}
.profile-chip span{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.scorecard{margin-top:16px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);border-radius:18px;padding:14px 16px;backdrop-filter:blur(8px)}
.scorecard .lbl{font-size:10px;font-weight:700;letter-spacing:1px;color:rgba(255,255,255,.6)}
.scorecard .row{display:flex;align-items:center;gap:14px;margin-top:8px}
.scorecard .big{font-size:17px;font-weight:900}
.scorecard .sub{font-size:12px;color:rgba(255,255,255,.7);margin-top:3px}
.scorecard .tag{font-size:9px;letter-spacing:1.5px;color:rgba(255,255,255,.32);margin-top:10px;font-weight:600}
.ring{position:relative;display:inline-flex;align-items:center;justify-content:center}
.ring svg{transform:rotate(-90deg)}
.ring .pct{position:absolute;font-weight:900}
main{padding:16px}
.sec{margin-bottom:20px}
.sec-h{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.sec-h span{font-size:11px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.7px}
.sec-h button{background:none;color:var(--primary);font-size:12px;font-weight:700;padding:0}
.card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:13px;box-shadow:var(--shadow)}
.card+.card{margin-top:8px}
.pets-row{display:flex;gap:10px;overflow-x:auto;padding-bottom:4px}
.pet-card{flex:0 0 112px;background:var(--surface);border:2px solid var(--border);border-radius:18px;padding:13px 8px;text-align:center;cursor:pointer}
.pet-card .emo{font-size:32px}
.pet-card .nm{font-weight:700;font-size:14px;margin-top:3px}
.pet-card .br{color:var(--muted);font-size:10px;margin:1px 0 8px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pet-card .sl{font-size:9px;color:var(--muted);font-weight:700;letter-spacing:.4px;text-transform:uppercase;margin-top:3px}
.pet-add{flex:0 0 88px;background:var(--bg);border:2px dashed rgba(45,192,174,.5);border-radius:18px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;cursor:pointer;color:var(--primary);font-size:11px;font-weight:700}
.pet-add .plus{width:34px;height:34px;border-radius:50%;background:rgba(45,192,174,.15);display:flex;align-items:center;justify-content:center;font-size:20px}
.evt{display:flex;align-items:center;gap:10px;background:var(--surface);border:1px solid var(--border);border-left-width:4px;border-radius:12px;padding:10px 13px;margin-bottom:8px;cursor:pointer}
.evt .ic{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.evt .tx{flex:1;min-width:0}
.evt .t1{font-weight:600;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.evt .t2{color:var(--muted);font-size:11px;margin-top:1px}
.evt .bd{font-size:11px;font-weight:700;padding:3px 8px;border-radius:20px;white-space:nowrap}
.banner{background:rgba(224,82,82,.08);border:1.5px solid var(--danger);border-radius:14px;padding:12px 15px;display:flex;align-items:center;gap:10px;margin-bottom:16px;cursor:pointer}
.banner .n{width:26px;height:26px;border-radius:50%;background:var(--danger);color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:900}
.banner .t{flex:1}.banner .t b{color:var(--danger);font-size:13px;display:block}
.banner .t small{color:var(--danger);opacity:.75;font-size:11px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;background:var(--primary);color:#fff;border-radius:22px;padding:12px 20px;font-size:14px;font-weight:700;width:100%}
.btn.sm{padding:7px 13px;font-size:12px;width:auto}
.btn.outline{background:transparent;border:1.5px solid var(--primary);color:var(--primary)}
.btn.danger{background:var(--danger)}
.btn.dangero{background:transparent;border:1.5px solid var(--danger);color:var(--danger)}
.btn.success{background:var(--success)}
.btn.warn{background:var(--warning)}
.btn.gray{background:var(--border);color:var(--muted)}
.btn.rx{background:var(--rx)}
.modal{position:fixed;inset:0;background:rgba(15,27,46,.65);z-index:100;display:flex;align-items:flex-end;backdrop-filter:blur(3px)}
.modal .sheet{width:100%;max-width:480px;margin:0 auto;background:var(--surface);border-radius:24px 24px 0 0;max-height:88vh;display:flex;flex-direction:column}
.modal .mh{display:flex;justify-content:space-between;align-items:center;padding:18px 18px 12px;border-bottom:1px solid var(--border)}
.modal .mh h2{font-size:17px}
.modal .mh .x{width:30px;height:30px;border-radius:50%;background:var(--bg);color:var(--muted);font-size:16px;display:flex;align-items:center;justify-content:center}
.modal .mb{overflow-y:auto;padding:14px 18px;flex:1}
.modal .mf{padding:12px 18px calc(12px + env(safe-area-inset-bottom));border-top:1px solid var(--border);display:flex;gap:10px}
.modal.ov{z-index:300;align-items:center;justify-content:center;padding:22px}
.modal.ov .sheet{border-radius:22px;max-height:80vh;max-width:400px;animation:vfcpop .18s ease;box-shadow:0 24px 70px rgba(0,0,0,.35)}
.modal.ov .mf{border-top:none;padding-top:2px}
@keyframes vfcpop{from{transform:scale(.92);opacity:0}to{transform:scale(1);opacity:1}}
.chips{display:flex;flex-wrap:wrap;gap:8px}
.chip{background:var(--bg);color:var(--muted);border:1px solid var(--border);border-radius:18px;padding:7px 13px;font-size:12px;font-weight:600}
.chip.on{background:var(--primary);color:#fff;border-color:var(--primary)}
.ptabs{display:flex;gap:3px;background:rgba(0,0,0,.15);border-radius:12px;padding:4px;margin-top:12px}
.ptabs button{flex:1;padding:9px 0;border-radius:10px;font-size:11px;font-weight:700;background:transparent;color:rgba(255,255,255,.8)}
.ptabs button.on{background:#fff;color:var(--dark)}
.irow{display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--border);font-size:13px}
.irow:last-child{border-bottom:none}
.irow .k{color:var(--muted)}.irow .v{font-weight:600;text-align:right;max-width:58%}
.st{font-size:11px;font-weight:700;padding:2px 8px;border-radius:20px}
.st.ok{background:rgba(45,179,122,.12);color:var(--success)}
.st.bad{background:rgba(224,82,82,.12);color:var(--danger)}
.st.soon{background:rgba(240,165,0,.12);color:var(--warning)}
.st.prog{background:rgba(78,142,172,.14);color:var(--vac)}
.tl-date{font-size:12px;font-weight:800;color:var(--warning)}
.tl-date.past{color:var(--vac)}
.subtabs{display:flex;gap:6px;margin-bottom:14px}
.subtabs .chip{flex:1;text-align:center;padding:9px 0;font-size:13px}
.wa-btn{width:38px;height:38px;border-radius:50%;background:#25D366;color:#fff;font-size:18px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.hbtn{width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,.18);border:1.5px solid rgba(255,255,255,.35);color:#fff;font-size:17px;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(6px);transition:transform .12s}
.hbtn:active{transform:scale(.9);background:rgba(255,255,255,.32)}
.hbtn.hdanger{background:rgba(224,82,82,.3);border-color:rgba(255,160,160,.5)}
.fab{position:fixed;left:16px;bottom:calc(88px + env(safe-area-inset-bottom,0px));width:58px;height:58px;border-radius:50%;background:var(--primary);color:#fff;font-size:30px;font-weight:300;box-shadow:0 10px 26px rgba(45,192,174,.5);z-index:60;display:flex;align-items:center;justify-content:center;border:none}
.pick{position:relative}
.pick-list{max-height:190px;overflow-y:auto;background:var(--surface);border:1.5px solid var(--primary);border-radius:12px;margin-top:4px;box-shadow:0 8px 22px rgba(20,40,70,.14)}
.pick-row{padding:10px 13px;border-bottom:1px solid var(--border);cursor:pointer;display:flex;justify-content:space-between;align-items:center;gap:8px;font-size:14px}
.pick-row:last-child{border-bottom:none}
.pick-row:active{background:var(--bg)}
.pick-row span{color:var(--muted);font-size:11px;white-space:nowrap}
.pwwrap{position:relative}
.pwwrap input{padding-right:46px;width:100%;box-sizing:border-box}
.pwwrap .eye{position:absolute;right:8px;top:50%;transform:translateY(-50%);background:none;font-size:18px;padding:6px}
#splash .pwwrap{width:100%}
#splash .pwwrap .eye{position:absolute;right:8px;top:50%;transform:translateY(-50%);width:auto;min-width:0;max-width:none;height:auto;padding:6px;margin:0;background:none;border:none;box-shadow:none;font-size:18px;font-weight:400;border-radius:0;letter-spacing:0;display:inline;color:inherit}
.dcells{display:flex;gap:16px;flex-wrap:wrap;margin-top:8px}
.dc .l{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase}
.dc .v{font-size:12px;font-weight:700;margin-top:1px}
.dc .v.red{color:var(--danger)}.dc .v.teal{color:var(--primary)}
.cal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.cal-head b{font-size:15px;text-transform:capitalize}
.cal-head button{background:var(--bg);border-radius:50%;width:32px;height:32px;color:var(--muted);font-size:16px}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cal-dow{text-align:center;font-size:11px;font-weight:700;color:var(--muted);padding:4px 0}
.cal-day{text-align:center;padding:7px 0 4px;border-radius:10px;font-size:13px;cursor:pointer;position:relative;background:none;color:var(--text)}
.cal-day.today{background:rgba(45,192,174,.18);font-weight:900}
.cal-day.sel{background:var(--primary);color:#fff;font-weight:900}
.cal-day .dots{display:flex;justify-content:center;gap:2px;margin-top:2px;height:4px}
.cal-day .dots i{width:4px;height:4px;border-radius:50%;background:var(--primary)}
.cal-day .dots i.od{background:var(--danger)}
.legend{display:flex;flex-wrap:wrap;gap:12px;margin:12px 0}
.legend span{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted)}
.legend i{width:8px;height:8px;border-radius:50%}
.acard{background:var(--surface);border:1px solid var(--border);border-radius:16px;overflow:hidden;margin-bottom:10px}
.acard .ah{padding:5px 14px;font-size:11px;font-weight:800}
.acard .ab{padding:12px 13px;display:flex;align-items:center;gap:11px}
.filters{display:flex;gap:6px;overflow-x:auto;margin-bottom:14px;padding-bottom:2px}
.filters .chip{flex-shrink:0}
.switch{width:46px;height:26px;border-radius:13px;background:var(--border);position:relative;transition:.2s;flex-shrink:0}
.switch.on{background:var(--primary)}
.switch i{position:absolute;top:3px;left:3px;width:20px;height:20px;border-radius:50%;background:#fff;transition:.2s;box-shadow:0 1px 4px rgba(0,0,0,.2)}
.switch.on i{left:23px}
.srow{display:flex;align-items:center;justify-content:space-between;padding:11px 0;border-bottom:1px solid var(--border);font-size:14px}
.srow:last-child{border-bottom:none}
nav{position:fixed;bottom:0;left:0;right:0;max-width:480px;margin:0 auto;background:var(--surface);border-top:1px solid var(--border);display:flex;padding:6px 0 calc(8px + env(safe-area-inset-bottom));z-index:50}
nav button{flex:1;background:none;display:flex;flex-direction:column;align-items:center;gap:2px;color:var(--muted);font-size:9px;font-weight:600;position:relative;padding:4px 0}
nav button .nic{width:42px;height:28px;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:19px}
nav button.on{color:var(--primary);font-weight:800}
nav button.on .nic{background:rgba(45,192,174,.14)}
nav .nbadge{position:absolute;top:0;right:calc(50% - 22px);width:16px;height:16px;border-radius:50%;background:var(--danger);color:#fff;font-size:9px;font-weight:900;display:flex;align-items:center;justify-content:center}
.empty{text-align:center;padding:26px 16px;color:var(--muted);font-size:13px}
.empty .big{font-size:42px;margin-bottom:10px}
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:var(--dark);color:#fff;padding:11px 20px;border-radius:14px;font-size:13px;font-weight:600;z-index:200;box-shadow:0 8px 24px rgba(0,0,0,.3);white-space:nowrap;max-width:92vw;overflow:hidden;text-overflow:ellipsis}
canvas{width:100%!important}
.pet-hero{padding:16px 16px 0;color:#fff;border-radius:0 0 24px 24px}
.pet-hero .top{display:flex;justify-content:space-between;margin-bottom:12px}
.pet-hero .bk,.pet-hero .del{background:rgba(255,255,255,.2);color:#fff;border-radius:20px;padding:6px 12px;font-size:12px;font-weight:700}
.pet-hero .info{display:flex;align-items:flex-end;gap:13px;padding-bottom:12px}
.pet-hero .av{width:70px;height:70px;border-radius:50%;background:rgba(255,255,255,.22);border:3px solid rgba(255,255,255,.8);display:flex;align-items:center;justify-content:center;font-size:34px;flex-shrink:0;overflow:hidden}
.pet-hero .av img{width:100%;height:100%;object-fit:cover}
.pet-hero h2{font-size:24px;letter-spacing:-.5px}
.pet-hero .l1{font-size:13px;color:rgba(255,255,255,.82)}
.pet-hero .l2{font-size:11px;color:rgba(255,255,255,.62);margin-top:2px}
.doc-up{border:2px dashed var(--border);border-radius:12px;padding:20px;text-align:center;color:var(--muted)}
.docrow{display:flex;align-items:center;gap:11px}
.docrow .di{width:40px;height:40px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:19px;flex-shrink:0}
.upbox{border:2px dashed var(--border);border-radius:12px;padding:14px;text-align:center;cursor:pointer;color:var(--muted);font-size:12px}
.upbox img{max-height:60px;max-width:100%;object-fit:contain}
#installBanner{background:var(--dark);color:#fff;padding:10px 16px;display:flex;align-items:center;gap:10px;font-size:13px}
#installBanner button{background:var(--primary);color:#fff;border-radius:16px;padding:6px 14px;font-size:12px;font-weight:700}
.rxcontent{white-space:pre-wrap;font-size:13px;color:var(--text);background:var(--bg);border-radius:10px;padding:10px 12px;margin-top:8px;max-height:120px;overflow:hidden}
</style>
</head>
<body>

<div id="splash">
  <img src="logo.jpg" alt="VetFlowCare" onerror="this.style.display='none'">
  <div class="wm"><span class="v">Vet</span><span class="f">Flow</span></div>
  <div class="care">Care</div>
  <div class="pro">PROFISSIONAL</div>
  <div class="tag">ORGANIZA · CONECTA · CUIDA</div>
  <button onclick="enterApp()">Entrar no App</button>
  <div class="sub">Gestão veterinária completa</div>
</div>

<div id="installBanner" class="hidden">
  <span style="flex:1">📲 Instale o VetFlowCare na tela inicial!</span>
  <button id="installBtn">Instalar</button>
</div>

<header id="appHeader" class="hidden">
  <div class="topbar">
    <img src="logo.jpg" alt="" onerror="this.style.display='none'">
    <div>
      <div class="wm">Vet<span class="f">Flow</span></div>
      <div class="care">Care</div>
    </div>
    <div class="spacer"></div>
    <button class="profile-chip" onclick="goTab('settings')">👨‍⚕️ <span id="profileName">Profissional</span></button>
  </div>
  <div class="scorecard" id="scorecard"></div>
</header>

<div id="petHero" class="hidden"></div>
<main id="mainContent"></main>

<nav id="mainNav" class="hidden">
  <button data-tab="home" class="on" onclick="goTab('home')"><span class="nic">🏠</span>Início</button>
  <button data-tab="pets" onclick="goTab('pets')"><span class="nic">🐾</span>Pacientes</button>
  <button data-tab="fin" onclick="goFinance()"><span class="nic">💰</span>Financeiro</button>
  <button data-tab="calendar" onclick="goTab('calendar')"><span class="nic">📅</span>Agenda</button>
  <button data-tab="alerts" onclick="goTab('alerts')"><span class="nic">🔔</span>Alertas<span class="nbadge hidden" id="alertBadge"></span></button>
  <button data-tab="settings" onclick="goTab('settings')"><span class="nic">⚙️</span>Ajustes</button>
</nav>

<div id="modals"></div>
<div id="modals2"></div>

<script>
/* ═══════════════════════════════════════════════
   VETFLOWCARE v4.0 PRO — Gestão Veterinária
   Perfil único do profissional · Receituário · Prontuário
   ═══════════════════════════════════════════════ */

// ═══ BLINDAGENS ═══
// Anti-iframe: impede que embrulhem o app OFICIAL em outro site
// (não interfere em pré-visualizações e testes locais)
(function(){
  const OFICIAIS = ['brunorizzieri86-svg.github.io','vetflowcare.com.br','www.vetflowcare.com.br'];

// em certos modos), usa Math.random. Nunca retorna vazio.
function makeDevId(){
  const A = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let out = '';
  try{
    if(window.crypto && crypto.getRandomValues){
      const r = crypto.getRandomValues(new Uint8Array(4));
      out = [...r].map(b => A[b % A.length]).join('');
    }
  }catch(e){ /* iOS/Safari pode barrar — cai no fallback abaixo */ }
  if(!/^[A-Z0-9]{4}$/.test(out)){
    out = '';
    for(let i=0;i<4;i++) out += A[Math.floor(Math.random()*A.length)];
  }
  return out;
}

const LS_AUTH = 'vetflowcare_auth';
function loadDB(){
  try{
    const raw = localStorage.getItem(LS_KEY);
    if(raw){
      try{
        const parsed = JSON.parse(raw);
        if(parsed && parsed.__enc){ window._LOCKED = true; return defaultDB(); }
        return migrate(parsed);
      }catch(err){
        // Dados ilegíveis: preserva TUDO num resgate antes de qualquer coisa
        localStorage.setItem('vetflowcare_rescue', raw);
        window._RESCUE = true;
        console.warn('DB corrompido — resgate salvo', err);
        return defaultDB();
      }
    }
    // Migra da v3 (família) ou v2
    const v4 = localStorage.getItem('vetflowcare_v4');
    if(v4){ try{ return migrate(JSON.parse(v4)); }catch(e){} }
    const v3 = localStorage.getItem('vetflowcare_v3');
    if(v3){ try{ return migrateV3(JSON.parse(v3)); }catch(e){} }
    for(const k of ['vetflowcare_data','vetflowcare','vetflow_data','petData']){
      const old = localStorage.getItem(k);
      if(old){ try{ return migrateV3(migrateOldToV3(JSON.parse(old))); }catch(e){} }
    }
  }catch(e){ console.warn('loadDB', e); }
  return defaultDB();
}

function migrate(d){
  const base = defaultDB();
  d = Object.assign(base, d);
  d.vet = Object.assign(defaultDB().vet, d.vet||{});
  d.settings = Object.assign(defaultDB().settings, d.settings||{});
  d.license = Object.assign(defaultDB().license, d.license||{});
  d.charges = d.charges || [];
  d.expenses = d.expenses || [];
  // ID do Aparelho (licença Pro vinculada): 4 caracteres, criado uma única vez.
  // Vive dentro do DB — sobrevive a backup/restauração junto com os dados da clínica.
  // v9.9.2: geração blindada — no iPhone/Safari o crypto.getRandomValues pode falhar
  // (aba privada, iOS antigo), então caímos em Math.random para NUNCA ficar vazio.
  if(!d.devId || !/^[A-Z0-9]{4}$/.test(d.devId)) d.devId = makeDevId();
  d.pets = (d.pets||[]).map(normalizePet);
  d.tutors = (d.tutors||[]).map(normalizeTutor);
  // Converte campo antigo "tutor" (texto livre) em cadastro de tutor
  d.pets.forEach(p => {
    if(p.tutor && !p.tutorId){
      let t = d.tutors.find(x => x.name.toLowerCase() === p.tutor.toLowerCase());
      if(!t){ t = normalizeTutor({name: p.tutor}); d.tutors.push(t); }
      p.tutorId = t.id;
    }
  });
  return d;
}

async function persistDB(){

        new TextEncoder().encode(JSON.stringify(DB)));

      localStorage.setItem(LS_KEY, raw);

}
function b64e(u8){ let s=''; u8.forEach(b=>s+=String.fromCharCode(b)); return btoa(s); }
function b64d(str){ const s=atob(str); const u=new Uint8Array(s.length); for(let i=0;i<s.length;i++)u[i]=s.charCodeAt(i); return u; }

// ═══ IndexedDB — arquivos grandes (fotos/PDFs até 20MB) ═══
let _idb = null;
function idbOpen(){
  return new Promise((res, rej) => {
    const r = indexedDB.open('vetflowcare', 3);
    r.onupgradeneeded = () => {
      const db = r.result;
      if(!db.objectStoreNames.contains('docs')) db.createObjectStore('docs');
      if(!db.objectStoreNames.contains('snap')) db.createObjectStore('snap');
      if(!db.objectStoreNames.contains('mirror')) db.createObjectStore('mirror');
    };
    r.onsuccess = () => res(r.result);
    r.onerror = () => rej(r.error);
  });
}
function idbStore(store, mode, fn){
  return (async () => {
    _idb = _idb || await idbOpen();
    return new Promise((res, rej) => {
      const t = _idb.transaction(store, mode);
      const out = fn(t.objectStore(store));
      t.oncomplete = () => res(out && out.result !== undefined ? out.result : true);
      t.onerror = () => rej(t.error);
    });
  })();
}
async function idbPut(id, data){
  _idb = _idb || await idbOpen();
  return new Promise((res, rej) => {
    const t = _idb.transaction('docs', 'readwrite');
    t.objectStore('docs').put(data, id);
    t.oncomplete = res; t.onerror = () => rej(t.error);
  });
}
async function idbGet(id){
  _idb = _idb || await idbOpen();
  return new Promise((res, rej) => {
    const t = _idb.transaction('docs', 'readonly');
    const q = t.objectStore('docs').get(id);
    q.onsuccess = () => res(q.result || null);
    q.onerror = () => rej(q.error);
  });
}
async function idbDel(id){
  _idb = _idb || await idbOpen();
  return new Promise((res) => {
    const t = _idb.transaction('docs', 'readwrite');
    t.objectStore('docs').delete(id);
    t.oncomplete = res; t.onerror = res;
  });
}

async function migrateDocsToIDB(){
  let moved = 0;
  for(const pet of DB.pets){

    }

}

  const b = new Date(birth), n = new Date();
  let y = n.getFullYear()-b.getFullYear(), mo = n.getMonth()-b.getMonth();
  if(mo < 0 || (mo===0 && n.getDate() < b.getDate())){ y--; mo += 12; }
  if(n.getDate() < b.getDate()) mo--;
  if(mo < 0){ y--; mo += 12; }
  if(y>0 && mo>0) return `${y} ${y===1?'ano':'anos'} e ${mo} ${mo===1?'mês':'meses'}`;
  if(y>0) return `${y} ${y===1?'ano':'anos'}`;
  return `${Math.max(mo,0)} ${mo===1?'mês':'meses'}`;
}
function priorityOf(d){
  if(d<0) return 'overdue'; if(d===0) return 'today';
  if(d<=3) return 'high'; if(d<=7) return 'medium'; return 'low';

function healthScore(pet){
  let s = 100;
  pet.vaccines.filter(v => v.status !== 'aplicada').forEach(v => { const d = daysUntil(v.due); if(d<0) s-=12; else if(d<=7) s-=4; });
  pet.appointments.forEach(a => { if(daysUntil(a.date)<0 && !a.done) s-=3; });

}

async function initDataProtection(){

  try{
    if(navigator.storage && navigator.storage.persist){
      window._persistOK = await navigator.storage.persisted() || await navigator.storage.persist();
    }
  }catch(e){ window._persistOK = false; }
  // 2) Pontos de restauração escalonados (7 diários + 4 semanais + 6 mensais)
  try{ await snapshotEscalonado(); }catch(e){ console.warn('snap', e); }
  // 2b) Se o armazenamento principal sumiu, resgata da cópia interna
  try{ await checarEspelhoNaAbertura(); }catch(e){ console.warn('espelho', e); }
  // 2c) Confere se algum volume de dados despencou desde a última sessão
  try{ conferirIntegridade(); }catch(e){ console.warn('integridade', e); }
  // 3) Estado corrompido resgatado?
  if(window._RESCUE){
    setTimeout(()=>{
      vfcConfirm({icon:'🛟', title:'Dados preservados em resgate',
        msg:'Os dados salvos não puderam ser lidos e foram <b>preservados num arquivo de resgate</b>.<br>Vá em Ajustes → Proteção de Dados para baixar o resgate ou restaurar um ponto automático.',

    }, 800);
  }
}
async function dailySnapshot(){
  const raw = localStorage.getItem(LS_KEY);
  if(!raw || raw.length < 60) return; // nada relevante para proteger
  const today = todayISO();
  const keys = await listSnapshots();
  if(keys.includes(today)) return;
  await idbStore('snap', 'readwrite', s => s.put(raw, today));
  const all = (await listSnapshots()).sort();
  while(all.length > 10){ const k = all.shift(); await idbStore('snap','readwrite', s => s.delete(k)); }
  window._snapList = await listSnapshots();
}

  return idbStore('snap', 'readonly', s => s.getAllKeys()).catch(()=>[]);

function togglePw(id, btn){
  const el = document.getElementById(id);
  el.type = el.type === 'password' ? 'text' : 'password';
  btn.textContent = el.type === 'password' ? '👁' : '🙈';

    <button type="button" class="eye" onclick="togglePw('${id}',this)">👁</button></div>`;
}
function getAuth(){ try{ return JSON.parse(localStorage.getItem(LS_AUTH)||'null'); }catch(e){ return null; } }
async function deriveKey(pass, saltU8){
  const km = await crypto.subtle.importKey('raw', new TextEncoder().encode(pass), 'PBKDF2', false, ['deriveKey']);
  return crypto.subtle.deriveKey({name:'PBKDF2', salt:saltU8, iterations:150000, hash:'SHA-256'},
    km, {name:'AES-GCM', length:256}, false, ['encrypt','decrypt']);
}
async function makeCheck(key){
  const iv = crypto.getRandomValues(new Uint8Array(12));
  const ct = await crypto.subtle.encrypt({name:'AES-GCM', iv}, key, new TextEncoder().encode('vfc-ok'));
  return {iv:b64e(iv), ct:b64e(new Uint8Array(ct))};
}
async function verifyKey(key, check){
  try{
    const pt = await crypto.subtle.decrypt({name:'AES-GCM', iv:b64d(check.iv)}, key, b64d(check.ct));
    return new TextDecoder().decode(pt) === 'vfc-ok';
  }catch(e){ return false; }
}

async function unlockApp(){
  const auth = getAuth();
  const pass = document.getElementById('lockPass').value;
  const err = document.getElementById('lockErr');
  // Proteção contra tentativas em sequência (força bruta)
  const until = parseInt(localStorage.getItem('vfc_lock_until')||'0');
  if(Date.now() < until){
    err.textContent = `⏳ Muitas tentativas — aguarde ${Math.ceil((until-Date.now())/1000)}s`;
    return;
  }
  if(!pass){ err.textContent = 'Digite a senha'; return; }
  err.textContent = 'Verificando…';
  try{
    const key = await deriveKey(pass, b64d(auth.salt));
    if(!(await verifyKey(key, auth.check))){
      const tries = parseInt(localStorage.getItem('vfc_bad')||'0') + 1;
      localStorage.setItem('vfc_bad', tries);
      if(tries >= 5){
        localStorage.setItem('vfc_lock_until', Date.now() + 30000);
        localStorage.setItem('vfc_bad', '0');
        err.textContent = '⏳ 5 tentativas erradas — aguarde 30 segundos';
      } else {
        err.textContent = `⚠ Senha incorreta (${tries}/5)`;
      }
      return;
    }
    localStorage.removeItem('vfc_bad');
    localStorage.removeItem('vfc_lock_until');
    const blob = JSON.parse(localStorage.getItem(LS_KEY));
    const pt = await crypto.subtle.decrypt({name:'AES-GCM', iv:b64d(blob.iv)}, key, b64d(blob.ct));
    window._cryptoKey = key;
    window._LOCKED = false;
    DB = migrate(JSON.parse(new TextDecoder().decode(pt)));
    document.getElementById('lockScreen').remove();
    bootApp();
  }catch(e){ err.textContent = '⚠ Erro ao desbloquear: ' + (e.message||e); console.warn(e); }
}

function allReceivables(){
  const out = [];

    pet.appointments.forEach(a => {

      if(a.parcelas && a.parcelas.length){
        a.parcelas.forEach((p, i) => {
          out.push({kind:'parc', id:a.id+'#'+i, petId:pet.id, petName:pet.name, emo:petEmoji(pet),
            desc:`${a.title}${a.resumo?' · '+a.resumo:''} (${i+1}/${a.parcelas.length})`,
            valor:p.valor, due:p.due, status:p.status, paidAt:p.paidAt||null, rem:p.rem});
        });
      } else {
        out.push({kind:'atend', id:a.id, petId:pet.id, petName:pet.name, emo:petEmoji(pet),
          desc:a.title + (a.resumo?' · '+a.resumo:''), valor:a.valor,
          due:a.payDue || a.date, status:a.payStatus, paidAt:a.paidAt||null, rem:a.rem});
      }
    });
  });
  DB.charges.forEach(c => {
    const pet = DB.pets.find(p=>p.id===c.petId);
    out.push({kind:'avulso', id:c.id, petId:c.petId,
      petName: pet ? pet.name : '(paciente removido)', emo: pet ? petEmoji(pet) : '🐾',
      desc:c.desc, valor:c.valor, due:c.due, status:c.status, paidAt:c.paidAt||null, rem:c.rem});
  });
  return out;
}
function goFinance(){

  const paidMonth = all.filter(r=>r.status==='pago' && (r.paidAt||'').startsWith(ym))

    ${finView==='rec'?`<button class="btn sm" onclick="openChargeForm()">➕ Cobrança</button>`:''}

  <div class="subtabs">
    <button class="chip ${finView==='rec'?'on':''}" onclick="finView='rec';render()">💵 A Receber</button>
    <button class="chip ${finView==='desp'?'on':''}" onclick="finView='desp';render()">🧾 Despesas${isPro()?'':' 🔒'}</button>
    <button class="chip ${finView==='fluxo'?'on':''}" onclick="finView='fluxo';render()">📊 Fluxo${isPro()?'':' 🔒'}</button>

  if(finView === 'fluxo') return h + renderFluxo();
  h += `<input placeholder="🔍 Buscar por paciente ou descrição…" value="${esc(finQ)}" style="margin-bottom:12px"
    oninput="finQ=this.value.toLowerCase();debQ(()=>{document.getElementById('mainContent').innerHTML=renderFinance();

      <div style="font-size:11px;color:var(--muted);margin:2px 0 8px">Toque em 💬 para enviar o lembrete pelo WhatsApp${isPro()?'':' (recurso Pro)'}</div>
      ${lembrar.slice(0,4).map(r=>`<div style="display:flex;align-items:center;gap:8px;padding:5px 0;font-size:13px">

        <button class="btn sm" style="background:#25D366" onclick="cobrarWhats('${r.kind}','${r.id}')">💬</button></div>`).join('')}
      <label style="display:flex;align-items:center;gap:8px;margin-top:8px;font-size:11px;color:var(--muted);text-transform:none;letter-spacing:0;cursor:pointer">
        <input type="checkbox" checked onchange="DB.settings.payRem=this.checked;save();render()" style="accent-color:var(--primary)"> Avisar sobre vencimentos próximos</label>
    </div>`;
  }

  // Totais
  h += `<div style="display:flex;gap:10px;margin-bottom:12px">
    <div class="card" style="flex:1;text-align:center">
      <div style="font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase">A receber</div>

  h += `<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:6px">${filters.slice(0,3).map(([k,l,fn])=>{

  // Análise por período: Previsão × Realizado
  h += renderPeriodoCard(all);

function saveDueEdit(kind, id, force){
  const d = parseBRDate(val('fDueNew'));
  if(!d){ toast('⚠ Data inválida — use DD/MM/AAAA'); return; }
  if(!force && daysUntil(d) < 0){
    confirmPastDate(d, `saveDueEdit('${kind}','${id}',1)`, 'Vencimento da cobrança.');

  }

// ═══ ANÁLISE POR PERÍODO: Previsão × Realizado ═══
function setFinPA(campo, v){ finPA[campo] = v; refreshFin(); }
function refreshFin(){ document.getElementById('mainContent').innerHTML = renderFinance(); }
function finPAQuick(tipo){
  const now = new Date();
  const iso2br = iso => fmtDate(iso);
  if(tipo==='mes'){
    finPA.ini = iso2br(`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-01`);
    finPA.fim = iso2br(todayISO());
  } else if(tipo==='mespass'){
    const d1 = new Date(now.getFullYear(), now.getMonth()-1, 1);
    const d2 = new Date(now.getFullYear(), now.getMonth(), 0);
    finPA.ini = iso2br(d1.toISOString().slice(0,10));
    finPA.fim = iso2br(d2.toISOString().slice(0,10));
  } else if(tipo==='30d'){
    finPA.ini = iso2br(addDays(todayISO(), -30));
    finPA.fim = iso2br(todayISO());
  } else { finPA.ini=''; finPA.fim=''; }
  refreshFin();
}
function renderPeriodoCard(all){
  const ini = parseBRDate(finPA.ini), fim = parseBRDate(finPA.fim);
  const valido = ini && fim && ini <= fim;
  let corpo = '';
  if(valido){
    const inR = s => s && s >= ini && s <= fim;
    const previsto  = all.filter(r=>inR(r.due)).reduce((s,r)=>s+r.valor,0);
    const realizado = all.filter(r=>r.status==='pago' && inR(r.paidAt)).reduce((s,r)=>s+r.valor,0);
    const emAtraso  = all.filter(r=>r.status==='pendente' && inR(r.due) && daysUntil(r.due)<0).reduce((s,r)=>s+r.valor,0);
    const aVencer   = all.filter(r=>r.status==='pendente' && inR(r.due) && daysUntil(r.due)>=0).reduce((s,r)=>s+r.valor,0);
    const desp = DB.expenses.filter(e=>inR(e.date)).reduce((s,e)=>s+e.valor,0);
    const taxa = previsto > 0 ? Math.round(realizado/previsto*100) : (realizado>0?100:0);
    const dif = realizado - previsto;
    const encerrado = fim < todayISO();
    const maxB = Math.max(previsto, realizado, 1);
    const bar = (v,cor) => `<div style="flex:1;height:11px;background:var(--bg);border-radius:6px"><div style="height:100%;width:${Math.min(100,Math.round(v/maxB*100))}%;background:${cor};border-radius:6px"></div></div>`;
    corpo = `
    <div style="margin-top:10px;padding-top:10px;border-top:1px solid var(--border)">
      <span class="st ${encerrado?'ok':'prog'}" style="font-size:10px">${encerrado?'📊 Período encerrado — Previsão × Realizado':'⏳ Período em andamento — resultado parcial'}</span>
      <div style="display:flex;align-items:center;gap:8px;margin-top:10px">
        <span style="font-size:11px;min-width:74px;color:var(--muted)">Previsto</span>${bar(previsto,'var(--vac)')}
        <b style="font-size:11px;min-width:76px;text-align:right;color:var(--vac)">${fmtBRL(previsto)}</b></div>
      <div style="display:flex;align-items:center;gap:8px;margin-top:5px">
        <span style="font-size:11px;min-width:74px;color:var(--muted)">Realizado</span>${bar(realizado,'var(--success)')}
        <b style="font-size:11px;min-width:76px;text-align:right;color:var(--success)">${fmtBRL(realizado)}</b></div>
      <div style="display:flex;gap:12px;margin-top:12px;padding-top:9px;border-top:1px dashed var(--border)">
        <div style="flex:1;text-align:center"><div style="font-size:9px;font-weight:700;color:var(--muted);text-transform:uppercase">Realização</div>
          <b style="font-size:17px;color:${taxa>=80?'var(--success)':taxa>=50?'var(--warning)':'var(--danger)'}">${taxa}%</b></div>
        <div style="flex:1;text-align:center"><div style="font-size:9px;font-weight:700;color:var(--muted);text-transform:uppercase">Diferença</div>
          <b style="font-size:14px;color:${dif>=0?'var(--success)':'var(--danger)'}">${dif>=0?'+':'−'} ${fmtBRL(Math.abs(dif))}</b></div>
      </div>
      <div style="display:flex;gap:6px;flex-wrap:wrap;font-size:11px;margin-top:10px">
        ${emAtraso?`<span class="st bad">⚠ Em atraso ${fmtBRL(emAtraso)}</span>`:''}
        ${aVencer?`<span class="st prog">📅 A vencer ${fmtBRL(aVencer)}</span>`:''}
        ${desp?`<span class="st bad">🧾 Despesas ${fmtBRL(desp)}</span>`:''}
      </div>
      ${desp?`<div style="font-size:13px;margin-top:8px">Saldo realizado do período: <b style="color:${(realizado-desp)>=0?'var(--success)':'var(--danger)'}">${fmtBRL(realizado-desp)}</b></div>`:''}
    </div>`;
  } else if(finPA.ini || finPA.fim){
    corpo = `<div style="font-size:12px;color:var(--warning);margin-top:8px">⚠ Informe as duas datas completas (DD/MM/AAAA), com a inicial antes da final.</div>`;
  }
  return `<div class="card" style="margin-bottom:14px">
    <div style="display:flex;justify-content:space-between;align-items:center;cursor:pointer" onclick="finPA.open=!finPA.open;refreshFin()">
      <b style="font-size:13px">🔎 Análise por Período — Previsão × Realizado</b>
      <span style="color:var(--muted);font-size:14px">${finPA.open?'▲':'▼'}</span></div>
    ${finPA.open?`
    <div style="font-size:11px;color:var(--muted);margin-top:4px">Digite o período: o app compara o que estava <b>previsto para vencer</b> com o que foi <b>de fato recebido</b>.</div>
    <div style="display:flex;gap:8px;margin-top:8px">
      <div style="flex:1"><label style="margin-top:0">Data inicial</label>
        <input value="${esc(finPA.ini)}" placeholder="DD/MM/AAAA" inputmode="numeric" maxlength="10"
          oninput="maskDate(this)" onchange="setFinPA('ini', this.value)"></div>
      <div style="flex:1"><label style="margin-top:0">Data final</label>
        <input value="${esc(finPA.fim)}" placeholder="DD/MM/AAAA" inputmode="numeric" maxlength="10"
          oninput="maskDate(this)" onchange="setFinPA('fim', this.value)"></div></div>
    <div class="chips" style="margin-top:8px">
      <button class="chip" onclick="finPAQuick('mes')">Este mês</button>
      <button class="chip" onclick="finPAQuick('mespass')">Mês passado</button>
      <button class="chip" onclick="finPAQuick('30d')">Últimos 30 dias</button>
      ${(finPA.ini||finPA.fim)?`<button class="chip" onclick="finPAQuick('limpar')">✕ Limpar</button>`:''}
    </div>
    ${corpo}`:''}
  </div>`;
}
function findRec(kind, id){
  if(kind==='avulso') return DB.charges.find(c=>c.id===id);
  if(kind==='parc'){
    const [aid, idx] = id.split('#');
    for(const pet of DB.pets){
      const a = pet.appointments.find(x=>x.id===aid);
      if(a && a.parcelas) return {__parc:true, a, p:a.parcelas[parseInt(idx)]};
    }
    return null;
  }
  for(const pet of DB.pets){
    const a = pet.appointments.find(x=>x.id===id);
    if(a) return a;
  }
  return null;
}
function markPaid(kind, id){
  const r = findRec(kind, id); if(!r) return;
  if(r.__parc){
    r.p.status = 'pago'; r.p.paidAt = todayISO();
    if(r.a.parcelas.every(p=>p.status==='pago')){ r.a.payStatus='pago'; r.a.paidAt=todayISO(); }
  }
  else if(kind==='avulso'){ r.status='pago'; r.paidAt = todayISO(); }
  else { r.payStatus='pago'; r.paidAt = todayISO(); }
  save(); render(); toast('✅ Pagamento recebido!');
}
function undoPaid(kind, id){
  const r = findRec(kind, id); if(!r) return;
  if(r.__parc){ r.p.status='pendente'; r.p.paidAt=null; r.a.payStatus='pendente'; r.a.paidAt=null; }
  else if(kind==='avulso'){ r.status='pendente'; r.paidAt = null; }
  else { r.payStatus='pendente'; r.paidAt = null; }
  save(); render(); toast('↩ Voltou para pendente');
}
function markApptDone(petId, aid){
  const pet = DB.pets.find(p=>p.id===petId); if(!pet) return;
  const a = pet.appointments.find(x=>x.id===aid); if(!a) return;
  a.done = 1;
  save(); render(); toast('✓ Atendimento marcado como realizado!');
}
function markReminded(kind, id){
  const r = findRec(kind, id); if(!r) return;
  if(r.__parc) r.p.rem = 1; else r.rem = 1;
  save();
}
function delChargeItem(id){
  const c = DB.charges.find(x=>x.id===id);
  askDel('💰 Excluir cobrança', `Deseja excluir a cobrança <b>${esc(c?.desc||'')}</b> de <b>${fmtBRL(c?.valor)}</b>?`, `doDelChargeItem('${id}')`);
}
function doDelChargeItem(id){
  DB.charges = DB.charges.filter(c=>c.id!==id);
  save(); render(); toast('🗑️ Cobrança excluída');
}
// ── Editar/Excluir QUALQUER lançamento do financeiro (avulso, atendimento, parcela) ──
function editReceivable(kind, id, petId){
  if(kind==='avulso'){ openChargeForm(id); return; }
  const aid = kind==='parc' ? id.split('#')[0] : id;
  const pet = DB.pets.find(p => p.id===petId) || DB.pets.find(p => p.appointments.some(a=>a.id===aid));
  if(!pet){ toast('⚠ Atendimento não encontrado'); return; }
  openApptForm(pet.id, aid);
}
function delReceivable(kind, id){
  if(kind==='avulso'){ delChargeItem(id); return; }
  const r = allReceivables().find(x=>x.kind===kind && x.id===id);
  if(!r){ toast('⚠ Lançamento não encontrado'); return; }
  if(kind==='parc'){
    askDel('💳 Excluir parcela',
      `Excluir a parcela <b>${esc(r.desc)}</b> de <b>${fmtBRL(r.valor)}</b>?<br><span style="font-size:12px;color:var(--muted)">O atendimento continua na ficha do paciente. As demais parcelas são mantidas.</span>`,
      `doDelReceivable('parc','${id}')`);
  } else {
    askDel('💰 Excluir cobrança do atendimento',
      `Remover a cobrança de <b>${fmtBRL(r.valor)}</b> deste atendimento?<br><span style="font-size:12px;color:var(--muted)">O atendimento e o prontuário permanecem na ficha — só o valor sai do Financeiro.</span>`,
      `doDelReceivable('atend','${id}')`);
  }
}
function doDelReceivable(kind, id){
  if(kind==='atend'){
    for(const pet of DB.pets){
      const a = pet.appointments.find(x=>x.id===id);
      if(a){ a.valor = 0; a.payStatus = null; a.payDue = null; a.paidAt = null; a.parcelas = null; a.itens = null; break; }
    }
    save(); render(); toast('🗑️ Cobrança removida do Financeiro');
    return;
  }
  const [aid, idxStr] = id.split('#');
  const idx = parseInt(idxStr);
  for(const pet of DB.pets){
    const a = pet.appointments.find(x=>x.id===aid);
    if(!a || !a.parcelas) continue;
    a.parcelas.splice(idx, 1);
    if(a.parcelas.length === 0){
      a.valor = 0; a.payStatus = null; a.payDue = null; a.paidAt = null; a.parcelas = null; a.itens = null;
    } else {
      a.valor = a.parcelas.reduce((s,p)=>s+p.valor, 0);
      a.payDue = a.parcelas[0].due;
      if(a.parcelas.length === 1){
        const p0 = a.parcelas[0];
        a.payStatus = p0.status; a.payDue = p0.due; a.paidAt = p0.paidAt || null;
        a.parcelas = null;
      } else if(a.parcelas.every(p=>p.status==='pago')){
        a.payStatus = 'pago';
      }
    }
    break;
  }
  save(); render(); toast('🗑️ Parcela excluída');
}

function waPhone(t){ return (t?.phone || '').replace(/\D/g, ''); }
function firstName(t){ return (t?.name || '').trim().split(' ')[0] || 'tutor(a)'; }
function vetSign(){

function avisoTexto(pet, tipo, refId){
  const t = tutorOf(pet);
  const ola = `Olá, ${firstName(t)}! 😊`;
  if(tipo === 'atend'){
    const a = pet.appointments.find(x => x.id === refId);
    if(!a) return ola + vetSign();
    const quando = `${fmtDate(a.date)}${a.time ? ' às ' + a.time : ''}`;
    const past = daysUntil(a.date) < 0;
    return past
      ? `${ola}\n\nEstou passando para saber como está o(a) ${pet.name} depois do atendimento de ${quando} (${a.title}).\n\nQualquer dúvida, é só me chamar!${vetSign()}`
      : `${ola}\n\nLembrete do atendimento do(a) ${pet.name}: ${a.title}, no dia ${quando}.${a.clinic ? `\nLocal: ${a.clinic}` : ''}\n\nSe precisar remarcar, é só me avisar!${vetSign()}`;
  }
  if(tipo === 'vacina'){
    const v = pet.vaccines.find(x => x.id === refId);
    if(!v) return ola + vetSign();
    const d = daysUntil(v.due);
    const sit = d < 0
      ? `está com a vacina *${v.name}* atrasada desde ${fmtDate(v.due)}`
      : d === 0 ? `tem a vacina *${v.name}* marcada para hoje`
      : `tem a vacina *${v.name}* prevista para ${fmtDate(v.due)}`;
    return `${ola}\n\nO(A) ${pet.name} ${sit}.\n\nVamos agendar a aplicação? Me avise o melhor dia para você.${vetSign()}`;
  }
  if(tipo === 'med'){
    const m = pet.medications.find(x => x.id === refId);
    if(!m) return ola + vetSign();
    return `${ola}\n\nLembrete da medicação do(a) ${pet.name}:\n*${m.name}* — ${m.dosage}, ${m.freq} às ${m.time}.\n\nQualquer reação diferente, me avise na hora.${vetSign()}`;

function saveExpense(editId, force){
  const desc = val('fEDesc'), valor = parseFloat(val('fEValor'));
  if(!desc || !valor){ toast('⚠ Preencha descrição e valor'); return; }
  if(!(valor > 0 && valor < 1000000)){ toast('⚠ Valor inválido — use um número positivo'); return; }
  const date = parseBRDate(val('fEDate')) || todayISO();
  const e0 = editId ? DB.expenses.find(x=>x.id===editId) : null;
  const dateChanged = !e0 || e0.date !== date;
  // Despesas antigas são normais (lançar a compra de ontem) — só confirma se for MUITO antiga
  if(dateChanged && daysUntil(date) < -30 && !force){
    confirmPastDate(date, `saveExpense('${editId||''}',1)`, 'Data da despesa — confira se não foi erro de digitação.');

  if(editId){
    Object.assign(e0,

    DB.expenses.push({id:uid(), desc, cat:document.getElementById('fECat').value, valor, date});

// ═══ FLUXO MENSAL (Pro) ═══// ═══ FLUXO MENSAL (Pro) ═══
function fluxoBuckets(){
  const now = new Date();
  const mk = (label, months) => ({label, months});
  const ym = d => d.toISOString().slice(0,7);
  const out = [];
  if(finPeriod === 'm'){
    for(let i=0;i<12;i++){
      const d = new Date(now.getFullYear(), now.getMonth()-i, 1);
      out.push(mk(`${MONTHS[d.getMonth()]} ${d.getFullYear()}`, [ym(d)]));
    }
  } else if(finPeriod === 't'){
    const q0 = Math.floor(now.getMonth()/3);
    for(let i=0;i<4;i++){
      const qs = new Date(now.getFullYear(), (q0-i)*3, 1);
      const ms = [0,1,2].map(k => ym(new Date(qs.getFullYear(), qs.getMonth()+k, 1)));
      out.push(mk(`${Math.floor(qs.getMonth()/3)+1}º trim. ${qs.getFullYear()}`, ms));
    }
  } else if(finPeriod === 's'){
    const s0 = now.getMonth() < 6 ? 0 : 6;
    for(let i=0;i<4;i++){
      const ss = new Date(now.getFullYear(), s0 - i*6, 1);
      const ms = [0,1,2,3,4,5].map(k => ym(new Date(ss.getFullYear(), ss.getMonth()+k, 1)));
      out.push(mk(`${ss.getMonth()<6?'1º':'2º'} sem. ${ss.getFullYear()}`, ms));
    }
  } else {
    for(let i=0;i<3;i++){
      const y = now.getFullYear()-i;
      out.push(mk(String(y), Array.from({length:12},(_,k)=>`${y}-${String(k+1).padStart(2,'0')}`)));
    }
  }
  return out;
}
function fluxoRows(){
  const all = allReceivables();
  return fluxoBuckets().map(b => {
    const inB = s => b.months.some(m => (s||'').startsWith(m));
    const receb = all.filter(r=>r.status==='pago' && inB(r.paidAt)).reduce((s,r)=>s+r.valor,0);
    const prev  = all.filter(r=>r.status==='pendente' && inB(r.due)).reduce((s,r)=>s+r.valor,0);
    const desp  = DB.expenses.filter(e=>inB(e.date)).reduce((s,e)=>s+e.valor,0);
    return {label:b.label, receb, prev, desp, saldo:receb-desp};
  }).filter((r,i) => r.receb || r.prev || r.desp || i < 3);
}
function renderFluxo(){
  if(!isPro()) return `<div class="card" style="cursor:pointer" onclick="openProModal('O fluxo financeiro é um recurso Pro.')">
    <div style="font-size:14px">🔒 <b>Fluxo Financeiro</b></div>
    <div style="font-size:12px;color:var(--muted);margin-top:4px">Acompanhe por mês, trimestre, semestre ou ano — recebido, a receber, despesas e saldo. Disponível no <b style="color:var(--rx)">✨ Pro</b>.</div></div>`;
  const pers = [['m','Mensal'],['t','Trimestral'],['s','Semestral'],['a','Anual']];
  let h = `<div class="chips" style="margin-bottom:10px">${pers.map(([k,l])=>
    `<button class="chip ${finPeriod===k?'on':''}" onclick="finPeriod='${k}';render()">${l}</button>`).join('')}
    <button class="chip" onclick="printFluxo()">📄 PDF</button></div>`;
  const rows = fluxoRows();
  // Resumo do período
  const tR = rows.reduce((s,r)=>s+r.receb,0), tP = rows.reduce((s,r)=>s+r.prev,0),
        tD = rows.reduce((s,r)=>s+r.desp,0), tS = tR - tD;
  // Produção clínica do período (atendimentos por tipo)
  const perMonths = new Set();
  fluxoBuckets().forEach(b => b.months.forEach(m => perMonths.add(m)));
  const inPer = s => s && perMonths.has(s.slice(0,7));
  const prodCount = {};

  const allRecv = allReceivables();

  const ticket = pagosN ? tR / pagosN : 0;
  const taxa = (tR + tP) > 0 ? Math.round(tR / (tR + tP) * 100) : 100;
  h += `<div class="card" style="margin-bottom:12px">

    <div style="margin-top:8px;font-size:15px">Saldo do período: <b style="color:${tS>=0?'var(--success)':'var(--danger)'}">${fmtBRL(tS)}</b></div>

      <div style="flex:1;text-align:center"><div style="font-size:9px;font-weight:700;color:var(--muted);text-transform:uppercase">Taxa de recebimento</div>
        <b style="font-size:16px;color:${taxa>=80?'var(--success)':taxa>=50?'var(--warning)':'var(--danger)'}">${taxa}%</b></div>
      <div style="flex:1;text-align:center"><div style="font-size:9px;font-weight:700;color:var(--muted);text-transform:uppercase">Ticket médio</div>
        <b style="font-size:16px">${fmtBRL(ticket)}</b></div>
      <div style="flex:1;text-align:center"><div style="font-size:9px;font-weight:700;color:var(--muted);text-transform:uppercase">Atendimentos</div>
        <b style="font-size:16px">${prodTot}</b></div>
    </div></div>`;
  // Card de produção clínica por tipo
  if(prodTot){
    const TIPO_EMO = {'Consulta':'🩺','Retorno':'🔄','Vacinação':'💉','Exame':'🔬','Cirurgia':'🏥','Emergência':'🚨','Orientações via Telefone':'📞'};
    const maxT = Math.max(...Object.values(prodCount));
    h += `<div class="card" style="margin-bottom:12px">
      <div style="font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;margin-bottom:8px">🩺 Produção clínica do período</div>
      ${Object.entries(prodCount).sort((a,b)=>b[1]-a[1]).map(([t,n])=>`
        <div style="display:flex;align-items:center;gap:8px;margin-top:6px">
          <span style="font-size:12px;min-width:110px">${TIPO_EMO[t]||'📌'} ${esc(t)}</span>
          <div style="flex:1;height:9px;background:var(--bg);border-radius:5px"><div style="height:100%;width:${Math.round(n/maxT*100)}%;background:var(--primary);border-radius:5px"></div></div>
          <b style="font-size:12px;min-width:24px;text-align:right">${n}</b></div>`).join('')}
    </div>`;
  }
  // Gráfico de barras: recebido × despesas por período
  const maxV = Math.max(1, ...rows.map(r=>Math.max(r.receb, r.desp, r.prev)));
  const chartRows = [...rows].reverse();
  h += `<div class="card" style="margin-bottom:12px">
    <div style="font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;margin-bottom:8px">📊 Evolução</div>
    ${chartRows.map(r=>`<div style="margin-top:8px">
      <div style="font-size:11px;font-weight:700;margin-bottom:3px">${r.label}</div>
      <div style="display:flex;align-items:center;gap:6px;margin-top:2px">

function buildChgParcelas(){
  const n = parseInt(document.getElementById('fCParc')?.value)||1;
  const total = parseFloat(val('fCValor'))||0;
  const rows = document.getElementById('fCParcRows');
  const info = document.getElementById('fCParcInfo');
  document.getElementById('fCParc1').style.display = n===1 ? 'block' : 'none';
  if(!rows) return;
  if(n === 1){ rows.innerHTML=''; info.style.display='none'; return; }
  info.style.display = 'block';
  const base = Math.floor((total/n)*100)/100;
  let html = '';
  for(let i=0;i<n;i++){
    const v = i===n-1 ? (total - base*(n-1)).toFixed(2) : base.toFixed(2);
    const sug = fmtDate(addDays(todayISO(), 30*(i+1)));
    const oldV = document.getElementById('fCParcV'+i)?.value;
    const oldD = document.getElementById('fCParcD'+i)?.value;
    html += `<div style="display:flex;gap:8px;align-items:flex-end;margin-top:8px">
      <div style="flex:1"><label>Parcela ${i+1} (R$)</label>
      <input id="fCParcV${i}" type="number" step="0.01" inputmode="decimal" value="${oldV||(total?v:'')}"></div>
      <div style="flex:1"><label>Vencimento</label>
      <input id="fCParcD${i}" placeholder="DD/MM/AAAA" inputmode="numeric" maxlength="10" value="${oldD||sug}" oninput="maskDate(this)"></div></div>`;
  }
  rows.innerHTML = html;
}
function saveCharge(editId, force){
  const desc = val('fCDesc'), valor = parseFloat(val('fCValor'));
  if(!desc || !valor){ toast('⚠ Preencha descrição e valor'); return; }
  if(!(valor > 0 && valor < 1000000)){ toast('⚠ Valor inválido — use um número positivo'); return; }
  const status = document.querySelector('#fCPay .chip.on')?.dataset.v || 'pendente';
  const petId = pickValue('fCPet');
  if(!petId){ toast('⚠ Paciente não encontrado — escolha da lista'); return; }
  const petSel = DB.pets.find(p=>p.id===petId);
  const n = (status==='pendente') ? (parseInt(document.getElementById('fCParc')?.value)||1) : 1;

  if(n > 1){
    // Parcelado: valida todas as parcelas
    const parc = [];
    let soma = 0;
    for(let i=0;i<n;i++){
      const v = parseFloat(document.getElementById('fCParcV'+i)?.value)||0;
      const d = parseBRDate(document.getElementById('fCParcD'+i)?.value);
      if(!v || !d){ toast(`⚠ Preencha valor e data (DD/MM/AAAA) da parcela ${i+1}`); return; }
      soma += v; parc.push({v, d});
    }
    if(Math.abs(soma - valor) > 0.01){ toast(`⚠ As parcelas (${fmtBRL(soma)}) não fecham o total (${fmtBRL(valor)})`); return; }
    const past = parc.find(p => daysUntil(p.d) < 0);
    if(past && !force){
      confirmPastDate(past.d, `saveCharge('${editId||''}',1)`, 'Vencimento de uma das parcelas.');
      return;
    }
    const oldC = editId ? DB.charges.find(x=>x.id===editId) : null;
    parc.forEach((p,i) => {
      const base = {petId:petSel.id, desc:`${desc} (${i+1}/${n})`, valor:p.v, due:p.d,
        status:'pendente', paidAt:null, createdAt: oldC?.createdAt || todayISO()};
      if(i===0 && oldC) Object.assign(oldC, base);
      else DB.charges.push({id:uid(), ...base});
    });
    save(); closeSheet(); render();
    toast(`💰 Cobrança em ${n}x registrada!`);
    return;
  }

  const due = parseBRDate(val('fCDue')) || todayISO();
  const c0 = editId ? DB.charges.find(x=>x.id===editId) : null;
  const dueChanged = !c0 || c0.due !== due;
  if(status==='pendente' && dueChanged && daysUntil(due) < 0 && !force){
    confirmPastDate(due, `saveCharge('${editId||''}',1)`, 'Vencimento da cobrança.');
    return;
  }
  if(editId){
    Object.assign(c0, {petId:petSel.id, desc, valor, due, status,
      paidAt: status==='pago' ? (c0.paidAt||todayISO()) : null});
  } else {
    DB.charges.push({id:uid(), petId:petSel.id,
      desc, valor, due, status,
      paidAt: status==='pago' ? todayISO() : null, createdAt:todayISO()});
  }
  save(); closeSheet(); render(); toast(editId?'✏️ Cobrança atualizada!':'💰 Cobrança registrada!');
}

function addMonths(iso, m){

function vfcChecksum(seed, devId){
  // v9.9: código Pro VINCULADO ao aparelho — o mesmo código não ativa em outro celular.
  let h = 7;
  const s = seed + '|' + (devId||'') + 'ORGANIZACONECTACUIDA';
  for(let i=0;i<s.length;i++) h = (h*31 + s.charCodeAt(i)) % 99991;
  return String(1000 + (h % 9000));
}
function myDevId(){
  // Auto-reparo: se o ID estiver vazio ou inválido (ex: iPhone que abriu antes do

function allEvents(){
  const evts = [];
  for(const pet of DB.pets){
    const base = {petId:pet.id, pet:pet.name, emo:petEmoji(pet)};
    pet.vaccines.filter(v => v.status !== 'aplicada').forEach(v => {
      const d = daysUntil(v.due);
      evts.push({...base, id:'v-'+v.id, type:'vaccine', title:v.name, due:v.due, daysLeft:d, priority:priorityOf(d)});
    });
    pet.medications.filter(m=>m.active).forEach(m => {
      evts.push({...base, id:'m-'+m.id, type:'medication', title:`${m.name} — ${m.time}`,
        due:todayISO(), daysLeft:0, priority:'today', medId:m.id});
    });
    pet.appointments.filter(a => !a.done).forEach(a => {
      const d = daysUntil(a.date);
      evts.push({...base, id:'a-'+a.id, type:'vet', title:a.title, due:a.date, daysLeft:d, priority:priorityOf(d)});
    });
  }
  // Pagamentos pendentes
  allReceivables().filter(r => r.status === 'pendente' && r.due).forEach(r => {
    const d = daysUntil(r.due);
    evts.push({petId:r.petId, pet:r.petName, emo:r.emo, id:'pay-'+r.id, type:'pay',
      title:`${fmtBRL(r.valor)} — ${r.desc}`, due:r.due, daysLeft:d, priority:priorityOf(d)});
  });
  return evts.sort((a,b)=>a.daysLeft-b.daysLeft);
}

  if(!localStorage.getItem('vfc_tut_done')){ setTimeout(()=>openTutorial(parseInt(localStorage.getItem('vfc_tut_step')||'0')), 500); }
  else if(!DB.vet.name){ setTimeout(openVetSetup, 500); }
  checarNovidades();
}

function vetIdsOk(num, sipe){
  if(num && !/^\d{3,6}$/.test(num)){ toast('⚠ CRMV inválido — use só números (3 a 6 dígitos)'); return false; }
  if(sipe && !/^\d{4,8}\/\d{4}$/.test(sipe)){ toast('⚠ SIPEAGRO/MAPA inválido — formato: 12345678/2020'); return false; }
  return true;
}
function saveVetSetup(){
  const name = val('sName');
  if(!name){ toast('⚠ Informe seu nome completo'); return; }
  if(!vetIdsOk(val('sNum'), val('sSipe'))) return;
  DB.vet.name = name;
  DB.vet.crmvUf = document.getElementById('sUf').value;
  DB.vet.crmvNum = val('sNum');
  DB.vet.sipeagro = val('sSipe');
  DB.vet.email = val('sEmail');
  save(); closeSheet(); render(); toast('👨‍⚕️ Dados salvos! Bem-vindo(a) ao VetFlowCare');
  if(!getAuth() && !localStorage.getItem('vfc_sec_prompted')){
    localStorage.setItem('vfc_sec_prompted','1');
    setTimeout(()=>{
      showSheet('🔐 Proteger seus dados?', `
        <div style="font-size:14px;line-height:1.8">Deseja criar um <b>login com senha</b> agora?<br><br>
        Todos os dados sensíveis (tutores, CPFs, telefones, prontuários) serão gravados com <b>criptografia AES-256</b> — proteção contra vazamentos caso alguém acesse seu celular.</div>`,
        `<button class="btn gray" onclick="closeSheet()">Depois</button>
         <button class="btn" onclick="closeSheet();openSecuritySetup()">🔐 Proteger agora</button>`);
    }, 700);
  }
}

// contador compacto para muitos passos

function openTutorial(step = 0){
  step = Math.min(step, TUT_STEPS.length - 1);
  localStorage.setItem('vfc_tut_step', step);
  const s = TUT_STEPS[step];
  const last = step === TUT_STEPS.length - 1;
  const dots = TUT_STEPS.map((_,i)=>
    `<span style="width:8px;height:8px;border-radius:50%;display:inline-block;margin:0 3px;background:${i===step?'var(--primary)':'var(--border)'}"></span>`).join('');
  showSheet(`${s.emo} ${s.title}`, `
    <div style="font-size:14px;line-height:1.7;color:var(--text)">${s.body}</div>
    ${s.action?`<button class="btn" style="margin-top:14px" onclick="${s.action.fn}">${s.action.label}</button>`:''}
    <div style="text-align:center;margin-top:16px">${dots}</div>
    <div style="text-align:center;color:var(--muted);font-size:11px;margin-top:6px">${step+1} de ${TUT_STEPS.length}</div>`,
    `${step>0?`<button class="btn gray" onclick="openTutorial(${step-1})">‹ Anterior</button>`:`<button class="btn gray" onclick="finishTutorial()">Pular</button>`}
     <button class="btn" onclick="${last?'finishTutorial()':`openTutorial(${step+1})`}">${last?'✓ Começar!':'Próximo ›'}</button>`);
}
function finishTutorial(skipNext){
  localStorage.setItem('vfc_tut_done','1');
  localStorage.setItem('vfc_seen_ver', APP_VER);
  localStorage.removeItem('vfc_tut_step');
  closeSheet();
  if(!skipNext && !DB.vet.name) setTimeout(openVetSetup, 300);
}
function goTab(tab){
  currentTab = tab; currentPetId = null; currentTutorId = null; showFinance = false;
  document.querySelectorAll('nav button').forEach(b => b.classList.toggle('on', b.dataset.tab===tab));
  render();
}
function openPet(id){ currentPetId = id; currentTutorId = null; showFinance = false; currentPetTab = 'info'; render(); }
function openTutor(id){ currentTutorId = id; currentPetId = null; tutorTab = 'resp'; render(); }

function render(){
  const hdr = document.getElementById('appHeader');
  const hero = document.getElementById('petHero');
  const main = document.getElementById('mainContent');
  updateBadge();

  if(currentPetId){
    const pet = DB.pets.find(p=>p.id===currentPetId);
    if(!pet){ currentPetId=null; return render(); }
    hdr.classList.add('hidden'); hero.classList.remove('hidden');
    renderPetHero(pet); main.innerHTML = renderPetTab(pet);
    if(currentPetTab==='info') drawWeightChart(pet);
    return;
  }
  hero.classList.add('hidden');
  if(showFinance){
    hdr.classList.add('hidden');
    main.innerHTML = renderFinance();
    return;
  }
  if(currentTutorId){
    hdr.classList.add('hidden');
    main.innerHTML = renderTutorProfile();
    return;
  }
  if(currentTab==='home'){ hdr.classList.remove('hidden'); renderScorecard(); main.innerHTML = renderHome(); }
  else { hdr.classList.add('hidden'); }
  if(currentTab==='pets')     main.innerHTML = renderPetsList();
  if(currentTab==='calendar') main.innerHTML = renderCalendar();
  if(currentTab==='alerts')   main.innerHTML = renderAlerts('all');
  if(currentTab==='settings') main.innerHTML = renderSettings();
}
function updateBadge(){
  const n = overdueEvents().length;
  const b = document.getElementById('alertBadge');
  b.textContent = n; b.classList.toggle('hidden', n===0);
}

function renderScorecard(){
  const pets = DB.pets;
  const avg = pets.length ? Math.round(pets.reduce((s,p)=>s+healthScore(p),0)/pets.length) : 100;
  const od = overdueEvents().length;
  document.getElementById('profileName').textContent = DB.vet.name ? DB.vet.name.split(' ')[0] : 'Perfil';
  document.getElementById('scorecard').innerHTML = `
    <div class="lbl">ÍNDICE DE SAÚDE DOS PACIENTES</div>
    <div class="row">${ringSVG(avg, 64, true)}
      <div><div class="big">${pets.length} ${pets.length===1?'paciente':'pacientes'}</div>
      <div class="sub">${od>0?`⚠ ${od} ${od===1?'item vencido':'itens vencidos'}`:'✓ Tudo em ordem!'}</div>
      ${crmvFull()?`<div class="sub" style="opacity:.7">${esc(DB.vet.name)} · ${crmvFull()}${isPro()?' · ✨ Pro':''}</div>`:''}</div>
    </div>
    <div class="tag">ORGANIZA · CONECTA · CUIDA</div>`;
}

function evtRow(e){
  const t = TYPE_CFG[e.type], pc = PRI_CLR[e.priority];
  const lbl = e.daysLeft<0?`${Math.abs(e.daysLeft)}d atraso`:e.daysLeft===0?'Hoje':`${e.daysLeft}d`;
  return `<div class="evt" style="border-left-color:${pc}" onclick="${e.type==='pay' ? 'goFinance()' : "openPet('"+e.petId+"')"}">
    <div class="ic" style="background:${t.bg}">${t.emo}</div>
    <div class="tx"><div class="t1">${e.emo} ${esc(e.pet)} — ${esc(e.title)}</div>
    <div class="t2">${e.due===todayISO()&&e.type==='medication'?'Hoje':fmtDate(e.due)}</div></div>
    <span class="bd" style="background:color-mix(in srgb, ${pc} 12%, transparent);color:${pc}">${lbl}</span></div>`;
}

function renderHome(){
  const pets = DB.pets, evts = allEvents();
  const od = evts.filter(e=>e.priority==='overdue');
  const week = evts.filter(e=>e.daysLeft>=0 && e.daysLeft<=7).slice(0,5);
  const meds = [];
  pets.forEach(p => p.medications.filter(m=>m.active).forEach(m => meds.push({pet:p, m})));

  let h = '';
  if(od.length) h += `<div class="banner" onclick="goTab('alerts')">
    <span style="font-size:20px">⚠️</span>
    <div class="t"><b>${od.length} ${od.length===1?'item vencido':'itens vencidos'} — ação necessária</b>
    <small>Toque para ver os detalhes</small></div><div class="n">${od.length}</div></div>`;

  // ⏳ Aviso de vencimento do plano Pro (7 dias antes + vencido)
  const _L = DB.license;
  if(_L && _L.expiresAt && localStorage.getItem('vfc_pro_snooze') !== todayISO()){
    const _dl = daysUntil(_L.expiresAt);
    const _venc = proExpired();

function toggleMedDone(petId, medId){
  const pet = DB.pets.find(p=>p.id===petId);
  const m = pet?.medications.find(x=>x.id===medId);
  if(!m) return;
  m.lastDone = m.lastDone === todayISO() ? null : todayISO();
  save(); render();
  if(m.lastDone) toast(`✓ ${m.name} marcada como administrada`);
}

async function uploadTutorFicha(tid, input){
  const file = input.files[0]; if(!file) return;
  if(file.size > 20_000_000){ toast('⚠ Arquivo muito grande (máx 20MB)'); return; }
  const r = new FileReader();
  r.onload = async e => {
    const id = uid();
    try{
      await idbPut(id, e.target.result);
      const t = DB.tutors.find(x=>x.id===tid);
      if(t.ficha) idbDel(t.ficha.id);
      t.ficha = {id, name:file.name, date:todayISO(), kind: file.type==='application/pdf'?'pdf':'img'};
      save(); render(); toast('📎 Ficha anexada!');
    }catch(err){ toast('⚠ Erro ao salvar'); }
  };
  r.readAsDataURL(file);
}
async function viewTutorFicha(tid){
  const t = DB.tutors.find(x=>x.id===tid);
  if(!t?.ficha) return;
  const data = await idbGet(t.ficha.id);
  if(!data){ toast('⚠ Arquivo não encontrado'); return; }
  if(t.ficha.kind === 'pdf'){
    const b64 = data.split(',')[1], bytes = atob(b64);
    const arr = new Uint8Array(bytes.length);
    for(let i=0;i<bytes.length;i++) arr[i] = bytes.charCodeAt(i);
    const a = document.createElement('a');
    a.href = URL.createObjectURL(new Blob([arr], {type:'application/pdf'}));
    a.download = t.ficha.name; a.click();
    toast('📄 PDF baixado');
    return;
  }
  const w = window.open('');
  if(!w){ toast('⚠ Permita pop-ups'); return; }
  w.document.write(`<title>${esc(t.ficha.name)}</title><body style="margin:0;background:#111;display:flex;align-items:center;justify-content:center;min-height:100vh"><img src="${data}" style="max-width:100%;max-height:100vh"></body>`);
}

async function buscaCEP(cep){
  const c = cep.replace(/\D/g,'');
  if(c.length !== 8) return;
  try{
    toast('🔎 Buscando endereço…');
    const r = await fetch(`https://viacep.com.br/ws/${c}/json/`);
    const d = await r.json();
    if(d.erro){ toast('⚠ CEP não encontrado'); return; }
    const addr = document.getElementById('tAddr');
    const bai = document.getElementById('tBairro');
    if(bai && !bai.value.trim() && d.bairro) bai.value = d.bairro;
    if(addr && !addr.value.trim()){
      addr.value = `${d.logradouro||''}${d.localidade?' — '+d.localidade:''}${d.uf?'/'+d.uf:''}`.replace(/^ — /,'');
      toast('✅ Endereço preenchido — adicione o número');
      addr.focus();
    }
  }catch(e){ /* offline: segue manual */ }
}

function drawWeightChart(pet){
  const cv = document.getElementById('weightChart');
  if(!cv || pet.weightHistory.length<2) return;
  const ctx = cv.getContext('2d');
  const W = cv.parentElement.clientWidth - 26, H = 150;
  cv.width = W * devicePixelRatio; cv.height = H * devicePixelRatio;
  cv.style.height = H+'px';
  ctx.scale(devicePixelRatio, devicePixelRatio);
  const data = pet.weightHistory.slice(-12);
  const kgs = data.map(d=>d.kg);
  const min = Math.min(...kgs)*0.96, max = Math.max(...kgs)*1.04;
  const px = i => 30 + (i/(data.length-1))*(W-45);
  const py = v => 12 + (1-(v-min)/(max-min||1))*(H-40);
  const c = petColor(pet);
  ctx.strokeStyle = getComputedStyle(document.body).getPropertyValue('--border'); ctx.lineWidth = .5;
  for(let i=0;i<4;i++){ const y = 12+i*(H-40)/3; ctx.beginPath();ctx.moveTo(28,y);ctx.lineTo(W-10,y);ctx.stroke();
    ctx.fillStyle = getComputedStyle(document.body).getPropertyValue('--muted'); ctx.font='9px sans-serif';
    ctx.fillText((max-(i*(max-min)/3)).toFixed(1), 0, y+3); }
  ctx.beginPath(); ctx.moveTo(px(0), H-24);
  data.forEach((d,i)=>ctx.lineTo(px(i), py(d.kg)));
  ctx.lineTo(px(data.length-1), H-24); ctx.closePath();
  ctx.fillStyle = c+'22'; ctx.fill();
  ctx.beginPath(); data.forEach((d,i)=> i?ctx.lineTo(px(i),py(d.kg)):ctx.moveTo(px(i),py(d.kg)));
  ctx.strokeStyle = c; ctx.lineWidth = 2.5; ctx.stroke();
  data.forEach((d,i)=>{
    ctx.beginPath(); ctx.arc(px(i),py(d.kg),4,0,7); ctx.fillStyle=c; ctx.fill();
    ctx.fillStyle = getComputedStyle(document.body).getPropertyValue('--muted'); ctx.font='9px sans-serif';
    const [y2,m2] = d.date.split('-');
    ctx.fillText(`${m2}/${y2.slice(2)}`, px(i)-10, H-10);
  });
}

function renderPetHealth(pet){

      .sort((a,b)=>(b.applied||'').localeCompare(a.applied||''));

      .sort((a,b)=>a.due.localeCompare(b.due))[0] || null;
    return {name, applied, next, protocol: doses[doses.length-1].protocol};

function uploadDoc(petId, input){
  const file = input.files[0]; if(!file) return;
  if(file.size > 20_000_000){ toast('⚠ Arquivo muito grande (máx 20MB)'); return; }
  const pet = DB.pets.find(p=>p.id===petId);
  // PDF: salva direto no IndexedDB
  if(file.type === 'application/pdf'){
    const r = new FileReader();
    r.onload = async e => {
      const id = uid();
      try{
        await idbPut(id, e.target.result);
        pet.documents.unshift({id, name:file.name, date:todayISO(), kind:'pdf'});
        save(); toast('📄 PDF salvo!'); render();
      }catch(err){ toast('⚠ Erro ao salvar o PDF'); }
    };
    r.readAsDataURL(file);
    return;
  }
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = async () => {
      const cv = document.createElement('canvas');
      const scale = Math.min(1, 1400/img.width);
      cv.width = img.width*scale; cv.height = img.height*scale;
      cv.getContext('2d').drawImage(img,0,0,cv.width,cv.height);
      const id = uid();
      try{
        await idbPut(id, cv.toDataURL('image/jpeg',.8));
        pet.documents.unshift({id, name:file.name, date:todayISO()});
        save(); toast('📄 Documento salvo!'); render();
      }catch(err){ toast('⚠ Erro ao salvar a imagem'); }
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}
async function viewDoc(petId, docId){
  const d = DB.pets.find(p=>p.id===petId)?.documents.find(x=>x.id===docId);
  if(!d) return;
  const data = d.data || await idbGet(d.id);
  if(!data){ toast('⚠ Arquivo não encontrado'); return; }
  d.data = data; // uso temporário abaixo
  if(d.kind === 'pdf'){
    // Converte para Blob (data: URL é bloqueada em novas abas)
    const b64 = d.data.split(',')[1];
    const bytes = atob(b64);
    const arr = new Uint8Array(bytes.length);
    for(let i=0;i<bytes.length;i++) arr[i] = bytes.charCodeAt(i);
    const url = URL.createObjectURL(new Blob([arr], {type:'application/pdf'}));
    const a = document.createElement('a');
    a.href = url; a.download = d.name;
    a.click();
    delete d.data;
    toast('📄 PDF baixado — abra pela notificação ou pasta Downloads');
    return;
  }
  const w = window.open('');
  if(!w){ toast('⚠ Permita pop-ups para visualizar'); return; }
  w.document.write(`<title>${esc(d.name)}</title><body style="margin:0;background:#111;display:flex;align-items:center;justify-content:center;min-height:100vh"><img src="${d.data}" style="max-width:100%;max-height:100vh"></body>`);
  delete d.data;
}

function renderCalendar(){
  const y = calMonth.getFullYear(), m = calMonth.getMonth();
  const first = new Date(y,m,1).getDay();
  const days = new Date(y,m+1,0).getDate();
  const now = new Date();
  const evts = allEvents();
  const byDay = {};
  evts.forEach(e => {
    const dt = new Date(e.due+'T00:00:00');
    if(dt.getFullYear()===y && dt.getMonth()===m) (byDay[dt.getDate()] = byDay[dt.getDate()]||[]).push(e);
  });
  let grid = ['D','S','T','Q','Q','S','S'].map(d=>`<div class="cal-dow">${d}</div>`).join('');
  for(let i=0;i<first;i++) grid += '<div></div>';
  for(let d=1;d<=days;d++){
    const isToday = d===now.getDate() && m===now.getMonth() && y===now.getFullYear();
    const isSel = d===calSelDay;
    const de = byDay[d]||[];
    const hasOD = de.some(e=>e.priority==='overdue');
    grid += `<button class="cal-day ${isToday?'today':''} ${isSel?'sel':''}" onclick="calSelect(${d})">${d}
      <div class="dots">${de.slice(0,3).map(()=>`<i class="${hasOD?'od':''}"></i>`).join('')}</div></button>`;
  }
  const sel = calSelDay ? (byDay[calSelDay]||[]) : evts.filter(e=>e.daysLeft>=0).slice(0,6);
  return `<h2 style="margin-bottom:14px">Agenda</h2>
    <div class="card">
      <div class="cal-head">
        <button onclick="calShift(-1)">‹</button><b>${MONTHS[m]} ${y}</b><button onclick="calShift(1)">›</button></div>
      <div class="cal-grid">${grid}</div>
      <div class="legend">
        <span><i style="background:var(--vac)"></i>Vacina</span>
        <span><i style="background:var(--med)"></i>Medicação</span>
        <span><i style="background:var(--vet)"></i>Atendimento</span>
        <span><i style="background:var(--warning)"></i>Pagamento</span>
        <span><i style="background:var(--danger)"></i>Vencido</span></div>
    </div>

let alertFilter = 'all';
function renderAlerts(f){
  if(f) alertFilter = f;
  const evts = allEvents();
  const filtered = evts.filter(e => {
    if(alertFilter==='overdue') return e.priority==='overdue';
    if(alertFilter==='today')   return e.priority==='today';
    if(alertFilter==='upcoming')return e.daysLeft>0;
    return true;
  });
  const od = evts.filter(e=>e.priority==='overdue').length;
  let h = `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
    <h2>Alertas</h2>${od?`<span class="st bad" style="padding:5px 10px">🔴 ${od} vencidos</span>`:''}</div>
    <div class="filters">
      ${[['all','Todos'],['overdue','Vencidos'],['today','Hoje'],['upcoming','Próximos']]
        .map(([k,l])=>`<button class="chip ${alertFilter===k?'on':''}"
        onclick="document.getElementById('mainContent').innerHTML=renderAlerts('${k}')">${l}</button>`).join('')}</div>`;
  if(!filtered.length) return h + `<div class="card empty"><div class="big">✅</div>Nenhum alerta nesta categoria</div>`;
  filtered.forEach(e => {
    const t = TYPE_CFG[e.type], pc = PRI_CLR[e.priority];
    const top = e.priority==='overdue' ? `⚠ VENCIDO HÁ ${Math.abs(e.daysLeft)} DIAS`
      : e.priority==='today' ? '📅 PARA HOJE' : `🔔 FALTAM ${e.daysLeft} DIAS`;
    h += `<div class="acard">
      <div class="ah" style="background:color-mix(in srgb,${pc} 10%,var(--surface));color:${pc}">${top}</div>
      <div class="ab">
        <div style="width:42px;height:42px;border-radius:13px;background:${t.bg};display:flex;align-items:center;justify-content:center;font-size:19px">${t.emo}</div>
        <div style="flex:1;min-width:0">
          <div style="font-weight:700;font-size:14px">${esc(e.title)}</div>
          <div style="color:var(--muted);font-size:12px">${e.emo} ${esc(e.pet)} · ${fmtDate(e.due)}</div></div>
        <button class="btn sm ${e.priority==='overdue'?'danger':'success'}"
          onclick="${e.type==='pay' ? 'goFinance()' : (e.type==='vet' && e.priority==='overdue') ? "markApptDone('"+e.petId+"','"+e.id.slice(2)+"')" : "openPet('"+e.petId+"');currentPetTab='health'"}">${(e.type==='vet'&&e.priority==='overdue')?'✓ Concluir':e.priority==='overdue'?'Resolver':'Ver'}</button>
      </div>
      ${e.type!=='pay' ? `<div style="padding:0 13px 12px">
        <button class="btn sm" style="background:#25D366;width:100%"
          onclick="openAvisarTutor('${e.petId}','${e.type==='vaccine'?'vacina':e.type==='medication'?'med':'atend'}','${e.id.slice(2)}')">💬 Avisar o tutor pelo WhatsApp</button></div>` : ''}
      </div>`;
  });
  return h;
}

function uploadVetImg(field, input){
  if(!isPro()){
    input.value = '';

      cv.getContext('2d').drawImage(img,0,0,cv.width,cv.height);

  };
  reader.readAsDataURL(file);
}

function csvParse(text){
  text = text.replace(/^\uFEFF/, '');
  const nl = text.indexOf('\n');
  const first = nl > -1 ? text.slice(0, nl) : text;
  const nT = (first.match(/\t/g)||[]).length, nS = (first.match(/;/g)||[]).length, nC = (first.match(/,/g)||[]).length;
  const delim = nT > nS && nT > nC ? '\t' : (nS >= nC ? ';' : ',');
  const rows = [];
  let row = [''], inQ = false;
  for(let i = 0; i < text.length; i++){
    const ch = text[i];
    if(inQ){
      if(ch === '"'){
        if(text[i+1] === '"'){ row[row.length-1] += '"'; i++; }
        else inQ = false;
      } else row[row.length-1] += ch;
    }
    else if(ch === '"') inQ = true;
    else if(ch === delim) row.push('');
    else if(ch === '\n' || ch === '\r'){
      if(ch === '\r' && text[i+1] === '\n') i++;
      if(row.length > 1 || row[0].trim() !== '') rows.push(row.map(c=>c.trim()));
      row = [''];
    }
    else row[row.length-1] += ch;
  }
  if(row.length > 1 || row[0].trim() !== '') rows.push(row.map(c=>c.trim()));
  if(!rows.length) return {headers:[], rows:[]};
  return {headers: rows[0], rows: rows.slice(1).filter(r => r.some(c => c !== ''))};
}
const IMP_FIELDS = [
  {k:'tNome',  label:'👤 Nome do tutor (obrigatório)', rx:/cliente|tutor|propriet|respons|dono/i, rx2:/^nome$/i},
  {k:'tFone',  label:'📞 Telefone / WhatsApp', rx:/fone|celular|whats|contato/i},
  {k:'tEmail', label:'✉️ E-mail', rx:/mail/i},
  {k:'tCpf',   label:'🪪 CPF', rx:/cpf/i},
  {k:'tBairro',label:'🏘️ Bairro', rx:/bairro/i},
  {k:'tEnd',   label:'📍 Endereço', rx:/endere|logradouro|rua/i},
  {k:'tCep',   label:'📮 CEP', rx:/cep/i},
  {k:'pNome',  label:'🐾 Nome do animal', rx:/animal|pet|paciente/i},
  {k:'pEsp',   label:'Espécie', rx:/esp[eé]cie/i},
  {k:'pRaca',  label:'Raça', rx:/ra[cç]a/i},
  {k:'pSexo',  label:'Sexo', rx:/sexo|g[eê]nero/i},
  {k:'pNasc',  label:'🎂 Nascimento', rx:/nasc/i},
  {k:'pPeso',  label:'⚖️ Peso', rx:/peso/i},
  {k:'pChip',  label:'Microchip', rx:/chip/i}
];
function impGuessMap(headers){
  const map = {}, used = new Set();
  IMP_FIELDS.forEach(f => {
    let idx = headers.findIndex((h,i) => !used.has(i) && f.rx.test(h));
    if(idx === -1 && f.rx2) idx = headers.findIndex((h,i) => !used.has(i) && f.rx2.test(h));
    if(idx > -1){ map[f.k] = idx; used.add(idx); }
  });
  return map;
}
function impNormEsp(v){
  v = (v||'').toLowerCase();
  if(/c[ãa]o|canin|cachorr|dog/.test(v)) return 'Cão';
  if(/gat|felin|cat/.test(v)) return 'Gato';
  if(/ave|p[áa]ssar|bird|calopsit|papagai/.test(v)) return 'Ave';
  return v ? 'Outro' : 'Cão';
}
function impNormSexo(v){ return /f/i.test(v||'') ? 'Fêmea' : 'Macho'; }
function impDate(v){
  v = (v||'').trim();
  let m = /^(\d{4})-(\d{2})-(\d{2})/.exec(v);
  if(m) return `${m[1]}-${m[2]}-${m[3]}`;
  m = /^(\d{1,2})[\/\-.](\d{1,2})[\/\-.](\d{4})/.exec(v);
  if(m) return `${m[3]}-${m[2].padStart(2,'0')}-${m[1].padStart(2,'0')}`;
  m = /^(\d{1,2})[\/\-.](\d{1,2})[\/\-.](\d{2})$/.exec(v);
  if(m){ const y = parseInt(m[3]) <= 26 ? '20'+m[3] : '19'+m[3]; return `${y}-${m[2].padStart(2,'0')}-${m[1].padStart(2,'0')}`; }
  return '';
}
