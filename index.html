function impFileRead(input){
  const f = input.files[0]; if(!f) return;
  const read = enc => {
    const r = new FileReader();
    r.onload = e => {
      const text = e.target.result;
      if(enc === 'UTF-8' && text.includes('\uFFFD')){ read('ISO-8859-1'); return; }
      const parsed = csvParse(text);
      if(!parsed.headers.length || !parsed.rows.length){
        toast('⚠ Arquivo vazio ou formato não reconhecido'); return;
      }
      window._imp = {headers: parsed.headers, rows: parsed.rows, map: impGuessMap(parsed.headers)};
      impStep2();
    };
    r.readAsText(f, enc);
  };
  read('UTF-8');
}

function impStep3(){
  const I = window._imp;
  IMP_FIELDS.forEach(f => {
    const v = parseInt(document.getElementById('impMap_' + f.k)?.value ?? -1);
    I.map[f.k] = v >= 0 ? v : undefined;
  });
  if(I.map.tNome === undefined){ toast('⚠ Aponte qual coluna tem o nome do tutor'); return; }
  const g = (row, k) => I.map[k] !== undefined ? (row[I.map[k]] || '').trim() : '';
  const digits = s => (s||'').replace(/\D/g,'');
  // Monta o plano
  const tutMap = {}; let skipped = 0, reusedT = 0, pets = [], dupP = 0;
  I.rows.forEach(row => {
    const nome = g(row,'tNome');
    if(!nome){ skipped++; return; }
    const key = nome.toLowerCase() + '|' + digits(g(row,'tFone'));
    if(!tutMap[key]){
      const existing = DB.tutors.find(t =>
        t.name.toLowerCase() === nome.toLowerCase() &&
        (!g(row,'tFone') || digits(t.phone) === digits(g(row,'tFone'))));
      if(existing){ tutMap[key] = {id: existing.id, existing: true}; reusedT++; }
      else tutMap[key] = {id: null, existing: false,
        data: {name: nome, phone: g(row,'tFone'), email: g(row,'tEmail'),
               cpf: g(row,'tCpf'), bairro: g(row,'tBairro'), address: g(row,'tEnd'), cep: g(row,'tCep')}};
    }
    const pNome = g(row,'pNome');
    if(pNome){
      const esp = impNormEsp(g(row,'pEsp'));
      const already = DB.pets.some(p => p.name.toLowerCase() === pNome.toLowerCase() &&
        tutMap[key].existing && p.tutorId === tutMap[key].id);
      if(already){ dupP++; return; }
      pets.push({tutKey: key, data: {name: pNome, species: esp, breed: g(row,'pRaca') || 'SRD',
        gender: impNormSexo(g(row,'pSexo')), birth: impDate(g(row,'pNasc')),
        weight: parseFloat((g(row,'pPeso')||'').replace(',','.')) || 0,
        microchip: g(row,'pChip')}});
    }
  });
  const newTutors = Object.values(tutMap).filter(t => !t.existing).length;
  let limitNote = '', petCount = pets.length;
  if(!isPro()){
    const room = Math.max(0, FREE_PET_LIMIT - DB.pets.length);
    if(pets.length > room){
      limitNote = `<div style="background:rgba(240,165,0,.1);border:1.5px solid var(--warning);border-radius:10px;padding:10px 12px;font-size:12px;margin-top:10px">
        ⚠ <b>Plano gratuito (limite de ${FREE_PET_LIMIT} animais):</b> serão importados só os <b>${room} primeiros</b> animais de ${pets.length}. Ative o ✨ Pro para importar todos.</div>`;
      petCount = room;
    }
  }
  I.plan = {tutMap, pets, petCount};
  const prev = I.rows.slice(0,3).map(row =>
    `<tr><td style="padding:5px 8px;border-bottom:1px solid var(--border)">${esc(g(row,'tNome')||'—')}</td>
     <td style="padding:5px 8px;border-bottom:1px solid var(--border)">${esc(g(row,'pNome')||'—')}</td>
     <td style="padding:5px 8px;border-bottom:1px solid var(--border)">${esc(impNormEsp(g(row,'pEsp')))}</td></tr>`).join('');
  showSheet('📥 Confirmar importação (passo 3 de 3)', `
    <div class="card" style="text-align:center">
      <div style="font-size:15px"><b>${newTutors}</b> tutores novos${reusedT?` · <b>${reusedT}</b> já existiam (serão aproveitados)`:''}</div>
      <div style="font-size:15px;margin-top:4px"><b>${petCount}</b> animais${dupP?` · ${dupP} duplicados ignorados`:''}${skipped?` · ${skipped} linhas sem tutor puladas`:''}</div>
    </div>
    <div style="font-size:11px;color:var(--muted);margin:10px 0 4px">Prévia das primeiras linhas:</div>
    <table style="width:100%;border-collapse:collapse;font-size:12px">
      <tr style="color:var(--muted)"><th style="text-align:left;padding:5px 8px">Tutor</th><th style="text-align:left;padding:5px 8px">Animal</th><th style="text-align:left;padding:5px 8px">Espécie</th></tr>${prev}</table>
    ${limitNote}
    <div style="font-size:11px;color:var(--muted);margin-top:12px">🛡️ Um ponto de restauração será criado antes — dá para desfazer em Ajustes → Proteção de Dados.</div>`,
    `<button class="btn gray" onclick="impStep2()">‹ Voltar</button>
     <button class="btn" onclick="doImport()">✅ Importar agora</button>`);
}
async function doImport(){
  const I = window._imp; if(!I?.plan) return;
  try{
    const raw = localStorage.getItem(LS_KEY);
    if(raw) await idbStore('snap','readwrite', s => s.put(raw, 'antes-importacao ' + new Date().toTimeString().slice(0,5)));
  }catch(e){}
  let nT = 0, nP = 0;
  Object.values(I.plan.tutMap).forEach(t => {
    if(!t.existing){
      const nt = normalizeTutor(t.data);
      DB.tutors.push(nt);
      t.id = nt.id; nT++;
    }
  });
  for(const p of I.plan.pets){
    if(nP >= I.plan.petCount) break;
    const pet = normalizePet({...p.data, tutorId: I.plan.tutMap[p.tutKey].id || ''});
    DB.pets.push(pet); nP++;
  }
  save(); gcEvent('importacao-csv');
  closeSheet(); goTab('pets'); render();
  toast(`✅ Importados: ${nT} tutores e ${nP} animais!`);
  window._imp = null;
}

async function saveFileSAF(name, blob){
  // 1) Desktop/Chrome com seletor de arquivo nativo
  if(window.showSaveFilePicker){
    try{
      const h = await showSaveFilePicker({suggestedName:name});
      const w = await h.createWritable();
      await w.write(blob); await w.close();
      toast('💾 Backup salvo!');
      return true;
    }catch(e){ if(e.name === 'AbortError') return true; }
  }
  // 2) Android/celular: oferece escolher o destino (Arquivos/Drive/WhatsApp) ou baixar direto
  window._pendFile = {name, blob};
  let canShare = false;
  try{ canShare = !!(navigator.canShare && navigator.canShare({files:[new File([blob], name, {type:'application/json'})]})); }catch(e){}
  if(canShare){
    vfcConfirm({icon:'💾', title:'Onde salvar o backup?',
      msg:`<b style="font-size:12px;word-break:break-all">${esc(name)}</b>`,
      note:'📤 "Escolher destino" abre o menu do celular: salve numa pasta (app Arquivos), no Google Drive ou envie no WhatsApp.', noteColor:'var(--vac)',
      noLabel:'⬇️ Baixar direto', no:'dlPendFile()',
      yesLabel:'📤 Escolher destino', yesBg:'var(--primary)', yes:'sharePendFile()'});
    return true;
  }
  dlPendFile();
  return true;
}
function dlPendFile(){
  const p = window._pendFile; if(!p) return;
  const a = document.createElement('a');
  a.href = URL.createObjectURL(p.blob);
  a.download = p.name; a.click();
  toast('📥 Backup salvo em Downloads');
}
async function sharePendFile(){
  const p = window._pendFile; if(!p) return;
  try{
    await navigator.share({files:[new File([p.blob], p.name, {type:'application/json'})], title:p.name});
    toast('💾 Backup enviado ao destino escolhido!');
  }catch(e){ if(e.name !== 'AbortError') dlPendFile(); }
}

function importJSON(input){
  const f = input.files[0]; if(!f) return;
  const r = new FileReader();
  r.onload = e => {
    try{
      const data = JSON.parse(e.target.result);
      // Backup criptografado (.vfcbak): restaura credenciais + dados cifrados
      if(data.__vfcbak){
        if(!data.auth || !data.blob){ toast('⚠ Arquivo de backup incompleto'); return; }
        window._pendBak = data;
        vfcConfirm({icon:'🔐', title:'Restaurar backup criptografado?',
          msg:'Os dados atuais deste aparelho serão <b>substituídos</b> pelos do backup.<br>Ao reabrir, será pedida a <b>senha da época do backup</b>.',
          note:'✅ Pacientes, financeiro, receitas e licença Pro do backup voltam junto.', noteColor:'var(--success)',
          noLabel:'Cancelar', yesLabel:'🔐 Sim, restaurar', yesBg:'var(--primary)', yes:'doRestoreVfcbak()'});
        return;
      }
      DB = data.version >= 4 ? migrate(data) : migrateV3(data);
      save(); applyDark(); render(); toast('✅ Dados importados com sucesso!');
    }catch(err){ toast('⚠ Arquivo inválido'); }
  };
  r.readAsText(f);
  input.value = '';
}
function doRestoreVfcbak(){
  const data = window._pendBak; if(!data) return;
  // Compatibilidade: backups v1 exportavam auth como OBJETO (bug) — normaliza para string.
  const authStr = typeof data.auth === 'string' ? data.auth : JSON.stringify(data.auth);
  const blobStr = typeof data.blob === 'string' ? data.blob : JSON.stringify(data.blob);
  try{
    const a = JSON.parse(authStr);
    if(!a || !a.salt || !a.check) throw 0;
  }catch(e){ toast('⚠ Credenciais do backup inválidas — use um backup .vfcbak novo'); return; }
  localStorage.setItem(LS_AUTH, authStr);
  localStorage.setItem(LS_KEY, blobStr);
  window._pendBak = null;
  toast('🔐 Backup restaurado! Recarregando…');
  setTimeout(()=>location.reload(), 900);
}

// ═══════════ 🛡️ PROTEÇÃO DE DADOS EM CAMADAS (v9.12) ═══════════
// O prontuário é documento legal (CFMV exige guardar 20 anos). Perder dado
// aqui não é perder arquivo: é perder histórico clínico. Por isso o app grava
// em DOIS lugares diferentes, guarda pontos de restauração escalonados,
// confere a integridade a cada abertura e cobra o backup externo.

// ── Camada 1: espelho automático em IndexedDB ──
// O localStorage pode ser limpo pelo navegador (pressão de espaço, "limpar
// dados", ITP do Safari). O IndexedDB usa outro mecanismo e costuma sobreviver.
// Gravar nos dois é a proteção mais barata contra o modo de falha mais comum.
let _mirrorTimer = null;
function agendarEspelho(raw){
  clearTimeout(_mirrorTimer);
  _mirrorTimer = setTimeout(() => gravarEspelho(raw), 1500);
}
async function gravarEspelho(raw){
  try{
    await idbStore('mirror', 'readwrite', s => s.put({
      raw, at: new Date().toISOString(), ver: APP_VER, sig: assinaturaDB()
    }, 'atual'));
  }catch(e){ console.warn('espelho', e); }
}
function lerEspelho(){
  return idbStore('mirror', 'readonly', s => s.get('atual')).catch(() => null);
}

// ── Camada 2: assinatura de integridade ──
// Guarda quantos registros existem. Se na próxima abertura o número despencar,
// algo deu errado — e o app avisa ANTES que o usuário grave por cima.
function assinaturaDB(){
  try{
    return {
      pets: DB.pets.length,
      tutors: DB.tutors.length,
      atend: DB.pets.reduce((s,p) => s + (p.appointments||[]).length, 0),
      vac:   DB.pets.reduce((s,p) => s + (p.vaccines||[]).length, 0),
      rx:    DB.pets.reduce((s,p) => s + (p.prescriptions||[]).length, 0),
      fin:   (DB.charges||[]).length + (DB.expenses||[]).length
    };
  }catch(e){ return null; }
}
function salvarAssinatura(){
  try{ localStorage.setItem('vfc_sig', JSON.stringify({...assinaturaDB(), at: todayISO()})); }catch(e){}
}
function conferirIntegridade(){
  let ant;
  try{ ant = JSON.parse(localStorage.getItem('vfc_sig') || 'null'); }catch(e){ return; }
  if(!ant) { salvarAssinatura(); return; }
  const ag = assinaturaDB();
  if(!ag) return;
  // Só alerta em perda relevante: nunca por 1 exclusão que o usuário fez de propósito
  const perdas = [];
  const cmp = (k, nome) => {
    const a = ant[k] || 0, b = ag[k] || 0;
    if(a >= 3 && b < a * 0.5) perdas.push(`${nome}: ${a} → ${b}`);
  };
  cmp('pets','pacientes'); cmp('tutors','tutores');
  cmp('atend','atendimentos'); cmp('vac','vacinas'); cmp('rx','receitas');
  if(perdas.length){
    window._perdaDetectada = perdas;
    setTimeout(() => {
      vfcConfirm({icon:'🚨', title:'Parte dos dados pode ter sumido',
        msg:`Comparando com a última vez que você usou o app:<br><br><b>${perdas.join('<br>')}</b><br><br>Isso pode ter sido você mesmo apagando — ou uma falha. <b>Não cadastre nada agora</b> até conferir.`,
        note:'Abra a Central de Proteção para restaurar um ponto anterior.', noteColor:'var(--danger)',
        noLabel:'Está certo, fui eu', yesLabel:'🛡️ Abrir Central', yesBg:'var(--danger)',
        yes:'openCentralProtecao()'});
    }, 1200);
  } else {
    salvarAssinatura();
  }
}

// ── Camada 3: pontos de restauração escalonados ──
// 7 diários + 4 semanais + 6 mensais. Cobre tanto o erro de hoje quanto o
// "só percebi que sumiu dois meses depois".
function semanaISO(d){
  const t = new Date(d.getTime());
  t.setHours(0,0,0,0);
  t.setDate(t.getDate() + 3 - ((t.getDay() + 6) % 7));
  const s1 = new Date(t.getFullYear(), 0, 4);
  const n = 1 + Math.round(((t - s1) / 86400000 - 3 + ((s1.getDay() + 6) % 7)) / 7);
  return `${t.getFullYear()}-W${String(n).padStart(2,'0')}`;
}
async function snapshotEscalonado(){
  const raw = localStorage.getItem(LS_KEY);
  if(!raw || raw.length < 60) return;
  const hoje = new Date();
  const chaves = {
    ['d:' + todayISO()]: 7,
    ['w:' + semanaISO(hoje)]: 4,
    ['m:' + todayISO().slice(0,7)]: 6
  };
  const atuais = await listSnapshots();
  for(const ch of Object.keys(chaves)){
    if(!atuais.includes(ch)){
      await idbStore('snap','readwrite', s => s.put(raw, ch));
    }
  }
  // limpeza por tipo, mantendo a quantidade definida
  const todas = await listSnapshots();
  for(const [pref, manter] of [['d:',7], ['w:',4], ['m:',6]]){
    const doTipo = todas.filter(k => String(k).startsWith(pref)).sort();
    while(doTipo.length > manter){
      const k = doTipo.shift();
      await idbStore('snap','readwrite', s => s.delete(k));
    }
  }
  // pontos antigos (formato anterior, sem prefixo) — mantém só os 3 mais novos
  const antigos = todas.filter(k => !/^[dwm]:/.test(String(k))).sort();
  while(antigos.length > 3){
    const k = antigos.shift();
    await idbStore('snap','readwrite', s => s.delete(k));
  }
  window._snapList = await listSnapshots();
}
function rotuloSnap(k){
  const s = String(k);
  if(s.startsWith('d:')) return '📅 Dia ' + fmtDate(s.slice(2));
  if(s.startsWith('w:')) return '🗓️ Semana ' + s.slice(2).replace('-W','/');
  if(s.startsWith('m:')){
    const [y,m] = s.slice(2).split('-');
    return '📆 ' + (MONTHS[parseInt(m)-1] || m) + '/' + y;
  }
  return '💾 ' + s;
}

// ── Camada 4: cobrança do backup externo ──
// Nenhuma proteção local salva de celular perdido, roubado ou quebrado.
// O app conta as alterações desde o último backup e aumenta o tom.
function marcarAlteracao(){

    localStorage.setItem('vfc_alt', String(n));
  }catch(e){}
}

  localStorage.setItem('vfc_alt', '0');

}
// Risco específico do iPhone: no Safari, dados de site NÃO instalado podem ser
// apagados após ~7 dias sem uso. Instalar na Tela de Início elimina o risco.
function iosSemInstalar(){
  const ios = /iphone|ipad|ipod/i.test(navigator.userAgent||'');
  const inst = window.navigator.standalone === true ||
    (window.matchMedia && window.matchMedia('(display-mode: standalone)').matches);
  return ios && !inst;
}
function nivelRisco(){
  const alt = altsSemBackup(), dias = daysSinceBackup();
  if(iosSemInstalar()) return 3;
  if(dias > 14 || alt >= 40) return 3;
  if(dias > 7  || alt >= 15) return 2;
  if(dias > 3  || alt >= 5)  return 1;
  return 0;
}

// ═══════════ 🗺️ ROTA DO DIA + QUILOMETRAGEM ═══════════
// Monta o roteiro dos atendimentos do dia com os endereços dos tutores,
// abre no Waze/Google Maps e registra o KM rodado como despesa.
function endTutor(t){
  if(!t) return '';
  const p = [t.address, t.bairro].filter(Boolean).join(', ');
  return p + (t.cep ? ' - CEP ' + t.cep : '');
}
function atendsDoDia(iso){
  const out = [];
  DB.pets.forEach(pet => {
    pet.appointments.forEach(a => {
      if(a.date !== iso || a.phone) return;   // orientação por telefone não entra na rota
      const t = tutorOf(pet);
      out.push({a, pet, tutor:t, end: a.clinic || endTutor(t)});
    });
  });
  return out.sort((x,y) => (x.a.time||'').localeCompare(y.a.time||''));
}

  } else {

    lista.forEach((x, i) => {
      const semEnd = !x.end.trim();
      corpo += `<div class="card" style="border-left:4px solid var(--primary)">
        <div style="display:flex;gap:10px;align-items:flex-start">

// ═══════════ 🎙️ DITADO POR VOZ + ESTRUTURAÇÃO AUTOMÁTICA ═══════════
// Usa o reconhecimento de voz do próprio aparelho (Web Speech API) — sem
// servidor e sem mensalidade de API. O texto ditado é organizado sozinho
// nas seções do prontuário, por palavras-chave, aqui mesmo no celular.
function voiceOK(){
  return !!(window.SpeechRecognition || window.webkitSpeechRecognition);
}
function micBtn(campoId, estruturar){
  return `<button type="button" id="mic_${campoId}" class="btn sm outline"
    style="border-color:var(--rx);color:var(--rx);margin-top:6px"
    onclick="toggleDitado('${campoId}',${estruturar?1:0})">🎙️ Ditar</button>
    <span id="micst_${campoId}" style="font-size:11px;color:var(--muted);margin-left:8px"></span>`;
}
const SECOES_PRONT = [
  {k:'QUEIXA PRINCIPAL', rx:/\b(queixa principal|queixa|motivo da consulta)\b/i},
  {k:'ANAMNESE',         rx:/\b(anamnese|hist[óo]rico|relato do tutor)\b/i},
  {k:'EXAME FÍSICO',     rx:/\b(exame f[íi]sico|ao exame|exame cl[íi]nico)\b/i},
  {k:'DIAGNÓSTICO',      rx:/\b(diagn[óo]stico|suspeita|hip[óo]tese diagn[óo]stica)\b/i},
  {k:'CONDUTA',          rx:/\b(conduta|tratamento|prescri[çc][ãa]o|prescrevo|orienta[çc][õo]es)\b/i},
  {k:'OBSERVAÇÕES',      rx:/\b(observa[çc][õo]es|observa[çc][ãa]o)\b/i}
];
function estruturarPront(txt){
  if(!txt || !txt.trim()) return '';
  const t = ' ' + txt.trim().replace(/\s+/g, ' ');
  const marcas = [];
  SECOES_PRONT.forEach(s => {
    const m = s.rx.exec(t);
    if(m) marcas.push({k:s.k, pos:m.index, len:m[0].length});
  });
  if(!marcas.length) return txt.trim();
  marcas.sort((a,b) => a.pos - b.pos);
  let out = '';
  const antes = t.slice(0, marcas[0].pos).trim();
  if(antes) out += antes + '\n\n';
  marcas.forEach((mk, i) => {
    const fim = i + 1 < marcas.length ? marcas[i+1].pos : t.length;
    let corpo = t.slice(mk.pos + mk.len, fim).trim()
      .replace(/^[:\-–,\s]+/, '')
      .replace(/\s+([.,;])/g, '$1');
    if(corpo){
      corpo = corpo.charAt(0).toUpperCase() + corpo.slice(1);
      if(!/[.!?]$/.test(corpo)) corpo += '.';
      out += mk.k + ':\n' + corpo + '\n\n';
    }
  });
  return out.trim();
}
let _rec = null, _recCampo = null, _recBase = '', _recOrig = '', _recFinais = [],
    _recAtivo = false, _recEstrut = 0, _recReinicios = 0, _recT0 = 0, _recSessao = 0;

// Rede de segurança: colapsa trechos repetidos em sequência. Serve de última
// linha de defesa caso o navegador reenvie fala já transcrita.
// Só age em trechos com 6+ caracteres — "sim sim" e "não não" são preservados.
function tirarRepeticoes(txt){
  if(!txt) return '';
  const p = txt.trim().split(/\s+/);
  const MAXN = Math.min(12, Math.floor(p.length / 2));
  for(let n = MAXN; n >= 1; n--){
    for(let i = 0; i + 2*n <= p.length; i++){
      const a = p.slice(i, i+n).join(' ').toLowerCase();
      const b = p.slice(i+n, i+2*n).join(' ').toLowerCase();
      if(a === b && a.replace(/\s/g,'').length >= 6){ p.splice(i+n, n); i--; }
    }
  }
  return p.join(' ');
}

function toggleDitado(campoId, estruturar){
  if(_rec && _recCampo === campoId){ _recAtivo = false; pararDitado(estruturar); return; }
  if(_rec){ _recAtivo = false; pararDitado(0); }
  const campo = document.getElementById(campoId);
  if(!campo) return;
  if(!voiceOK()){
    vfcConfirm({icon:'🎙️', title:'Ditado por voz',
      msg:'Este navegador não tem reconhecimento de voz próprio.<br><br><b>Mas dá para ditar do mesmo jeito:</b> toque no campo de texto e use o <b>ícone de microfone do teclado do celular</b> — funciona em qualquer aparelho.',
      note:'💡 No Android pelo Chrome, o ditado embutido do app funciona direto.', noteColor:'var(--vac)',
      single:1, yesLabel:'Entendi', yesBg:'var(--primary)', yes:''});
    return;
  }
  _recCampo  = campoId;
  _recBase   = campo.value ? campo.value.replace(/\s+$/, '') + '\n' : '';
  _recOrig   = _recBase;
  _recFinais = [];
  _recAtivo  = true;
  _recEstrut = estruturar ? 1 : 0;
  _recReinicios = 0;
  _recT0 = Date.now();
  iniciarRec();
}

function iniciarRec(){
  const campoId = _recCampo;
  const campo = document.getElementById(campoId);
  const st  = document.getElementById('micst_' + campoId);
  const btn = document.getElementById('mic_' + campoId);
  if(!campo){ _recAtivo = false; return; }

  // Cada sessão tem um número. Eventos que chegam atrasados de uma sessão
  // encerrada são IGNORADOS — era essa corrida que duplicava a fala.
  const token = ++_recSessao;
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  const rec = new SR();
  _rec = rec;
  rec.lang = 'pt-BR';
  rec.continuous = true;
  rec.interimResults = true;

  rec.onstart = function(){
    if(token !== _recSessao) return;
    if(btn){ btn.textContent = '⏹️ Parar'; btn.style.background = 'var(--danger)';
      btn.style.color = '#fff'; btn.style.borderColor = 'var(--danger)'; }
    if(st){ st.textContent = '🔴 Ouvindo… pode falar'; st.style.color = 'var(--danger)'; }
  };

  rec.onresult = function(ev){
    if(token !== _recSessao) return;          // sessão morta: descarta
    let parcial = '';
    for(let i = ev.resultIndex; i < ev.results.length; i++){
      const r = ev.results[i];
      if(r.isFinal) _recFinais[i] = (r[0].transcript || '').trim();
      else parcial += r[0].transcript;
    }
    const fin = _recFinais.filter(Boolean).join(' ');
    parcial = parcial.trim();
    campo.value = _recBase + fin + (parcial ? (fin ? ' ' : '') + parcial : '');
    campo.scrollTop = campo.scrollHeight;
  };

  rec.onerror = function(ev){
    if(token !== _recSessao) return;
    if(ev.error === 'not-allowed' || ev.error === 'service-not-allowed'){
      if(st){ st.textContent = '⚠ Permita o microfone nas configurações do navegador'; st.style.color = 'var(--warning)'; }
      _recAtivo = false;
    } else if(ev.error === 'network'){
      if(st){ st.textContent = '⚠ O ditado precisa de internet — use o microfone do teclado'; st.style.color = 'var(--warning)'; }
      _recAtivo = false;
    } else if(ev.error !== 'no-speech' && ev.error !== 'aborted'){
      if(st){ st.textContent = '⚠ Não deu para ouvir (' + ev.error + ')'; st.style.color = 'var(--warning)'; }
      _recAtivo = false;
    }
  };

  // O Chrome encerra sozinho após silêncio. Se o usuário não mandou parar,
  // consolidamos o que veio (sem repetições) e abrimos uma sessão nova.
  rec.onend = function(){
    if(token !== _recSessao) return;
    if(_recAtivo && _recReinicios < 60 && (Date.now() - _recT0) < 15*60*1000){
      _recReinicios++;
      rec.onresult = rec.onend = rec.onerror = rec.onstart = null;   // desliga o antigo
      const limpo = tirarRepeticoes(campo.value.replace(/\s+$/, ''));
      campo.value = limpo;
      _recBase = limpo ? limpo + ' ' : '';
      _recFinais = [];
      if(st){ st.textContent = '🔴 Ouvindo… pode falar'; st.style.color = 'var(--danger)'; }
      setTimeout(function(){ if(_recAtivo && token === _recSessao) iniciarRec(); }, 120);
      return;
    }
    pararDitado(_recEstrut);
  };

  try{ rec.start(); }
  catch(e){
    // "already started" é comum ao reiniciar rápido: tenta de novo em instantes
    if(_recAtivo && _recReinicios < 60){ setTimeout(function(){ if(_recAtivo) iniciarRec(); }, 350); return; }
    if(st) st.textContent = '⚠ Não foi possível iniciar';
    _rec = null; _recAtivo = false;
  }
}

function pararDitado(estruturar){
  const campoId = _recCampo;
  _recAtivo = false;
  _recSessao++;                                  // invalida tudo que estiver pendente
  if(_rec){
    try{ _rec.onresult = _rec.onend = _rec.onerror = _rec.onstart = null; _rec.stop(); }catch(e){}
  }
  _rec = null; _recCampo = null;
  if(!campoId) return;
  const campo = document.getElementById(campoId);
  const btn = document.getElementById('mic_' + campoId);
  const st  = document.getElementById('micst_' + campoId);
  if(btn){
    btn.textContent = '🎙️ Ditar';
    btn.style.background = 'transparent';
    btn.style.color = 'var(--rx)';
    btn.style.borderColor = 'var(--rx)';
  }
  if(campo){
    const jaTinha = _recOrig;
    let ditado = campo.value.startsWith(jaTinha) ? campo.value.slice(jaTinha.length) : campo.value;
    ditado = tirarRepeticoes(ditado);            // limpeza final
    if(ditado.trim()){
      const org = estruturar ? estruturarPront(ditado) : ditado.trim();
      const sep = jaTinha.trim() ? jaTinha.replace(/\s+$/, '') + '\n\n' : '';
      campo.value = (sep + org).trim();
      if(st && estruturar && org !== ditado.trim()){
        st.textContent = '✨ Texto organizado em seções'; st.style.color = 'var(--success)';
        _recBase = ''; _recOrig = '';
        return;
      }
    }
  }
  _recBase = ''; _recOrig = '';
  if(st && st.textContent.indexOf('⚠') !== 0) st.textContent = '';
}

function previewPhoto(input){
  const f = input.files[0]; if(!f) return;
  const r = new FileReader();
  r.onload = e => {
    const img = new Image();
    img.onload = () => {
      const cv = document.createElement('canvas');
      const scale = Math.min(1, 300/img.width);
      cv.width = img.width*scale; cv.height = img.height*scale;
      cv.getContext('2d').drawImage(img,0,0,cv.width,cv.height);
      window._photoData = cv.toDataURL('image/jpeg',.8);
      document.getElementById('photoPreview').innerHTML = `<img src="${window._photoData}" style="width:100%;height:100%;object-fit:cover">`;
    };
    img.src = e.target.result;
  };
  r.readAsDataURL(f);
}

    chip:val('fChip'), registry:val('fReg'), notes:val('fNotes'), photo:window._photoData };
  if(petId){
    const pet = DB.pets.find(p=>p.id===petId);
    const oldW = pet.weight;
    Object.assign(pet, fields);
    if(oldW !== weight) pet.weightHistory.push({date:todayISO(), kg:weight});
  } else {
    DB.pets.push(normalizePet({...fields,
      color: COLORS[DB.pets.length % COLORS.length],
      weightHistory: [{date:todayISO(), kg:weight}]}));
  }
  window._presetTutor = '';
  save(); closeSheet(); render(); toast(petId?'✏️ Paciente atualizado!':'🐾 Paciente cadastrado!');
}

function autoProtocol(name){
  const n = name.toLowerCase();
  const sel = document.getElementById('fVProt');
  if(n.includes('librela')) sel.value = 'librela';
  else if(n.includes('cytopoint')) sel.value = 'cytopoint';
  else sel.value = 'anual';
  calcNextDose();
}
function calcNextDose(){
  const prot = document.getElementById('fVProt')?.value || 'anual';
  const applied = document.getElementById('fVApplied')?.value || todayISO();
  const days = PROTOCOLS[prot].days;
  const el = document.getElementById('fVNext');
  if(el) el.textContent = days > 0 ? fmtDate(addDays(applied, days)) : '— (dose única)';
}
function saveVaccine(petId){
  const name = val('fVName'), applied = val('fVApplied');
  const prot = document.getElementById('fVProt').value || 'anual';
  if(!name || !applied){ toast('⚠ Preencha nome e data'); return; }
  const pet = DB.pets.find(p=>p.id===petId);
  const lot = val('fVLot'), vet = val('fVVet');
  // Dose aplicada
  pet.vaccines.push({id:uid(), name, protocol:prot, applied, due:applied, status:'aplicada', lot, vet});
  // Próxima dose programada, conforme o protocolo
  const days = PROTOCOLS[prot].days;
  if(days > 0){
    pet.vaccines.push({id:uid(), name, protocol:prot, applied:null,
      due:addDays(applied, days), status:'programada', lot:'', vet});
  }
  save(); closeSheet(); render();
  toast(days>0 ? `💉 Registrada! Próxima: ${fmtDate(addDays(applied,days))}` : '💉 Vacina registrada!');
}
function openApplyVaccineForm(petId, vid){
  const v = DB.pets.find(p=>p.id===petId).vaccines.find(x=>x.id===vid);
  showSheet('✓ Aplicar — '+esc(v.name), `
    <label>Data da aplicação *</label><input id="fAVDate" type="date" value="${todayISO()}">
    <label>Lote da vacina</label><input id="fAVLot" placeholder="Ex: 019/24">
    <div style="background:var(--vacbg);border-radius:10px;padding:10px 12px;font-size:12px;color:var(--vac);margin-top:12px">
      A próxima dose será agendada automaticamente pelo protocolo (${PROTOCOLS[v.protocol]?.label||''}).</div>`,
    `<button class="btn gray" onclick="closeSheet()">Cancelar</button>
     <button class="btn success" onclick="saveApplyVaccine('${petId}','${vid}')">✓ Confirmar Aplicação</button>`);
}
function saveApplyVaccine(petId, vid){
  const pet = DB.pets.find(p=>p.id===petId);
  const v = pet.vaccines.find(x=>x.id===vid);
  if(!v) return;
  const dt = val('fAVDate') || todayISO();
  v.status = 'aplicada'; v.applied = dt; v.due = dt; v.lot = val('fAVLot');
  // Primovacinação: após a 2ª dose, o reforço passa a ser anual
  const nextProt = v.protocol === 'primo' ? 'anual' : v.protocol;
  const days = PROTOCOLS[nextProt].days;
  if(days > 0){
    pet.vaccines.push({id:uid(), name:v.name, protocol:nextProt, applied:null,
      due:addDays(dt, days), status:'programada', lot:'', vet:v.vet||''});
  }
  save(); closeSheet(); render();
  toast(days>0 ? `✓ Aplicada! Próxima: ${fmtDate(addDays(dt,days))}` : '✓ Vacina aplicada!');
}

  'Equipamentos':'Equipamentos','Materiais':'Materiais','Medicamentos':'Medicamentos','Laboratório':'Laboratório','Outros':'Outros'};
function toggleApptDesp(btn){

function recalcApptDesp(){
  let t = 0;
  document.querySelectorAll('#fPDespRows .dVal').forEach(el => { t += parseFloat(el.value)||0; });
  const box = document.getElementById('fPDespTot');
  box.style.display = t > 0 ? 'block' : 'none';
  document.getElementById('fPDespTotTxt').textContent = fmtBRL(t);
}
function collectApptDesp(dateISO, petName){
  const out = []; let bad = 0;
  document.querySelectorAll('#fPDespRows .drow').forEach((row, i) => {
    const d = row.querySelector('.dDesc').value.trim();
    const v = parseFloat(row.querySelector('.dVal').value)||0;
    if(!d && !v) return; // linha vazia — ignora
    if(v < 0){ bad = i+1; return; }
    const dtTxt = row.querySelector('.dDate')?.value.trim() || '';
    let dt = dateISO; // padrão: data do atendimento
    if(dtTxt){
      const p = parseBRDate(dtTxt);
      if(!p){ bad = i+1; return; }
      dt = p; // aceita passado ou FUTURO (ex: anestesista a pagar)
    }
    if(d && v) out.push({id:uid(), desc:`${d} — ${petName}`, cat: DESP_CAT_MAP[d]||'Serviços/Procedimentos', valor:v, date:dt});
  });
  return {list: out, bad};
}
function recalcServTotal(){
  let total = 0;
  document.querySelectorAll('#fPItens .sVal').forEach(el => { total += parseFloat(el.value)||0; });
  document.getElementById('fPValor').value = total;
  const box = document.getElementById('fPTotalBox');
  box.style.display = total > 0 ? 'block' : 'none';
  document.getElementById('fPTotalTxt').textContent = fmtBRL(total);
  recalcParcelas();
}
function parseBRDate(txt){
  const m = /^(\d{2})\/(\d{2})\/(\d{4})$/.exec((txt||'').trim());
  if(!m) return null;
  return `${m[3]}-${m[2]}-${m[1]}`;
}
function maskCPF(el){
  el.value = el.value.replace(/\D/g,'').slice(0,11)
    .replace(/(\d{3})(\d)/,'$1.$2')
    .replace(/(\d{3})\.(\d{3})(\d)/,'$1.$2.$3')
    .replace(/\.(\d{3})(\d{1,2})$/,'.$1-$2');
}
function maskPhone(el){
  let d = el.value.replace(/\D/g,'').slice(0,11);
  if(d.length > 10)      el.value = d.replace(/(\d{2})(\d{5})(\d{0,4})/,'($1) $2-$3');
  else if(d.length > 6)  el.value = d.replace(/(\d{2})(\d{4})(\d{0,4})/,'($1) $2-$3');
  else if(d.length > 2)  el.value = d.replace(/(\d{2})(\d{0,5})/,'($1) $2');
  else                   el.value = d;
}
// Formatação para exibição (aceita valores antigos sem pontuação)
function fmtCPF(v){
  const d = (v||'').replace(/\D/g,'');
  return d.length === 11 ? d.replace(/(\d{3})(\d{3})(\d{3})(\d{2})/,'$1.$2.$3-$4') : (v || '—');
}
function fmtPhone(v){
  const d = (v||'').replace(/\D/g,'');
  if(d.length === 11) return d.replace(/(\d{2})(\d{5})(\d{4})/,'($1) $2-$3');
  if(d.length === 10) return d.replace(/(\d{2})(\d{4})(\d{4})/,'($1) $2-$3');
  return v || '—';
}
function fmtCEP(v){
  const d = (v||'').replace(/\D/g,'');
  return d.length === 8 ? d.replace(/(\d{5})(\d{3})/,'$1-$2') : (v || '—');
}
function maskCEP(el){
  el.value = el.value.replace(/\D/g,'').slice(0,8).replace(/^(\d{5})(\d)/,'$1-$2');
  if(el.value.length === 9) buscaCEP(el.value);
}
function maskDate(el){
  el.value = el.value.replace(/[^0-9]/g,'')
    .replace(/^(\d{2})(\d)/,'$1/$2')
    .replace(/^(\d{2}\/\d{2})(\d)/,'$1/$2')
    .slice(0,10);
}

function buildParcelas(){
  const n = parseInt(document.getElementById('fPParc').value)||1;
  const total = parseFloat(document.getElementById('fPValor').value)||0;
  document.getElementById('fPParc1').style.display = n===1 ? 'block' : 'none';
  const rows = document.getElementById('fPParcRows');
  const resto = document.getElementById('fPParcResto');
  if(n === 1){ rows.innerHTML=''; resto.style.display='none'; return; }
  const base = Math.floor((total/n)*100)/100;
  let html = '';
  for(let i=0;i<n;i++){
    const v = i===n-1 ? (total - base*(n-1)).toFixed(2) : base.toFixed(2);
    html += `<div style="display:flex;gap:8px;align-items:flex-end;margin-top:8px">
      <div style="flex:1"><label>Parcela ${i+1} (R$)</label>
      <input id="fPParcV${i}" type="number" step="0.01" inputmode="decimal" value="${total?v:''}" oninput="recalcParcelas()"></div>
      <div style="flex:1"><label>Vencimento</label>
      <input id="fPParcD${i}" placeholder="DD/MM/AAAA" inputmode="numeric" maxlength="10"
        value="${fmtDate(addDays(todayISO(), 30*(i+1)))}" oninput="maskDate(this)"></div></div>`;
  }
  rows.innerHTML = html;
  recalcParcelas();
}
function recalcParcelas(){
  const n = parseInt(document.getElementById('fPParc').value)||1;
  if(n === 1) return;
  const total = parseFloat(document.getElementById('fPValor').value)||0;
  let soma = 0;
  for(let i=0;i<n;i++) soma += parseFloat(document.getElementById('fPParcV'+i)?.value)||0;
  const resto = total - soma;
  const el = document.getElementById('fPParcResto');
  el.style.display = 'block';
  el.style.color = Math.abs(resto) < 0.01 ? 'var(--success)' : 'var(--warning)';
  el.innerHTML = Math.abs(resto) < 0.01
    ? `✓ Parcelas fecham o total de ${fmtBRL(total)}`
    : `Total: ${fmtBRL(total)} · Parcelado: ${fmtBRL(soma)} · <b>Restante: ${fmtBRL(resto)}</b>`;
}
function saveAppt(petId, force){
  const title = val('fPTitle');
  let date = val('fPDate');
  // Data digitada tem prioridade (DD/MM/AAAA → ISO)
  const txt = val('fPDateTxt');
  if(txt){
    const m2 = /^(\d{2})\/(\d{2})\/(\d{4})$/.exec(txt);
    if(!m2){ toast('⚠ Data digitada inválida — use DD/MM/AAAA'); return; }
    date = `${m2[3]}-${m2[2]}-${m2[1]}`;
  }
  window._presetDate = null;
  if(!title || !date){ toast('⚠ Preencha tipo e data'); return; }
  const pet = DB.pets.find(p=>p.id===petId);
  // Itens do atendimento
  const itens = [];
  document.querySelectorAll('#fPItens .srow').forEach(row => {
    const d = row.querySelector('.sDesc').value.trim();
    const v = parseFloat(row.querySelector('.sVal').value)||0;
    if(v < 0){ window._negServ = 1; }
    if(d || v > 0) itens.push({desc: d||'Serviço', valor: v});
  });
  if(window._negServ){ window._negServ = 0; toast('⚠ Valor negativo em um serviço — corrija'); return; }
  const valor = itens.reduce((s,i)=>s+i.valor, 0);
  let payStatus = null, payDue = null, paidAt = null;
  if(valor > 0){
    payStatus = document.querySelector('#fPPay .chip.on')?.dataset.v || 'pago';
    if(payStatus === 'pendente'){
      const n = parseInt(document.getElementById('fPParc')?.value)||1;
      if(n > 1){
        window._parcelas = [];
        let soma = 0;
        for(let i=0;i<n;i++){
          const v = parseFloat(document.getElementById('fPParcV'+i)?.value)||0;
          const d = parseBRDate(document.getElementById('fPParcD'+i)?.value);
          if(!v || !d){ toast(`⚠ Preencha valor e data (DD/MM/AAAA) da parcela ${i+1}`); return; }
          soma += v;
          window._parcelas.push({valor:v, due:d, status:'pendente', paidAt:null});
        }
        if(Math.abs(soma - valor) > 0.01){ toast(`⚠ As parcelas (${fmtBRL(soma)}) não fecham o total (${fmtBRL(valor)})`); return; }
        payDue = window._parcelas[0].due;
      } else {
        payDue = parseBRDate(val('fPPayDueTxt')) || val('fPPayDue');
        if(!payDue){ toast('⚠ Informe o vencimento do pagamento'); return; }
      }
      // v9.8: vencimento no passado pede confirmação elegante
      if(!force){
        const pastP = window._parcelas?.find(p => daysUntil(p.due) < 0);
        if(pastP){ confirmPastDate(pastP.due, `saveAppt('${petId}',1)`, 'Vencimento de uma das parcelas.'); return; }
        if(payDue && daysUntil(payDue) < 0){ confirmPastDate(payDue, `saveAppt('${petId}',1)`, 'Vencimento do pagamento deste atendimento.'); return; }
      }
    } else { paidAt = todayISO(); }
  }
  if(window._apptEdit){
    // Edição: atualiza no lugar, preservando parcelas e prontuário
    const a = pet.appointments.find(x=>x.id===window._apptEdit);
    if(a){
      const rec = val('fPRecord');
      Object.assign(a, {title, resumo:val('fPResumo'), date, time:val('fPTime')||'10:00',
        clinic:val('fPClinic'), valor, record: rec,
        done: date < todayISO() ? 1 : (rec ? (a.done||1) : 0),
        itens: itens.length ? itens : null});
      if(!a.parcelas){
        a.payStatus = valor > 0 ? payStatus : null;
        a.payDue = payDue; 
        if(payStatus === 'pago' && !a.paidAt) a.paidAt = todayISO();
        if(payStatus === 'pendente') a.paidAt = null;
      }
    }
    window._apptEdit = null; window._parcelas = null;
    save(); closeSheet(); render(); toast('✏️ Atendimento atualizado!');
    return;
  }
  // v9.8: despesas do atendimento → valida ANTES de gravar qualquer coisa
  const dc = isPro() ? collectApptDesp(date, pet.name) : {list:[], bad:0};
  if(dc.bad){ toast(`⚠ Data inválida na despesa ${dc.bad} — use DD/MM/AAAA ou deixe em branco`); return; }
  const despesas = dc.list;
  pet.appointments.push({
    id:uid(), title, resumo:val('fPResumo'), date, time:val('fPTime')||'10:00',
    clinic:val('fPClinic'), record:val('fPRecord'),
    valor, payStatus, payDue, paidAt,
    done: date < todayISO() ? 1 : 0,
    itens: itens.length ? itens : null,
    parcelas: (payStatus==='pendente' && window._parcelas?.length) ? window._parcelas : null});
  window._parcelas = null;
  if(despesas.length) DB.expenses.push(...despesas);
  const retorno = val('fPRetorno');
  if(retorno){
    pet.appointments.push({
      id:uid(), title:'Retorno', resumo:'Retorno de: '+title, date:retorno,
      time:val('fPTime')||'10:00', clinic:val('fPClinic'), record:''});
  }
  save(); closeSheet(); render();
  const dTxt = despesas.length ? ` · ${despesas.length} despesa${despesas.length>1?'s':''} → Financeiro` : '';
  toast(retorno ? `🩺 Salvo! Retorno agendado para ${fmtDate(retorno)}${dTxt}` : `🩺 Atendimento salvo!${dTxt}`);
}

function petSummaryText(pet){
  let t = `🐾 FICHA — ${pet.name}\n`;
  t += `${pet.species} · ${pet.breed||'SRD'} · ${pet.gender} · ${pet.fertility||''}\n`;
  if(tutorName(pet)) t += `Tutor: ${tutorName(pet)}\n`;
  t += `Nascimento: ${fmtDate(pet.birth)} (${calcAge(pet.birth)})\n`;
  t += `Peso: ${pet.weight} kg · Porte: ${pet.porte}\n`;
  if(pet.chip) t += `Microchip: ${pet.chip}\n`;
  if(pet.notes) t += `Obs: ${pet.notes}\n`;
  if(pet.vaccines.length){
    t += `\n💉 VACINAS:\n`;
    pet.vaccines.forEach(v => t += `• ${v.name} — aplicada ${fmtDate(v.applied)}, próxima ${fmtDate(v.due)}${v.lot?' (lote '+v.lot+')':''}\n`);
  }
  if(pet.medications.filter(m=>m.active).length){
    t += `\n💊 MEDICAÇÕES:\n`;
    pet.medications.filter(m=>m.active).forEach(m => t += `• ${m.name} (${m.dosage}) — ${m.freq} às ${m.time}\n`);
  }
  if(DB.vet.name) t += `\n${DB.vet.name}${crmvFull()?' · '+crmvFull():''}`;
  t += `\n— Gerado pelo VetFlowCare 🐾`;
  return t;
}

function doExportFicha(petId){
  const on = id => document.getElementById(id)?.checked;
  const pet = DB.pets.find(p=>p.id===petId);
  const t = tutorOf(pet);
  const th = s => `<th style="text-align:left;padding:7px">${s}</th>`;
  const H = s => `<h3 style="color:#2DC0AE;font-size:15px;border-bottom:2px solid #2DC0AE;padding-bottom:3px">${s}</h3>`;
  const TBL = inner => `<table style="width:100%;border-collapse:collapse;font-size:12px;margin:8px 0 18px">${inner}</table>`;
  let body = letterheadHTML() + `<div class="doctitle">FICHA DO PACIENTE</div>` + patientBlockHTML(pet);

  if(on('exTutor') && t){
    body += H('👤 Tutor / Responsável') + `<div style="font-size:13px;line-height:1.9;margin:8px 0 18px">
      <b>Nome:</b> ${esc(t.name)}${t.cpf?` · <b>CPF:</b> ${esc(t.cpf)}`:''}<br>
      ${t.phone?`<b>Telefone:</b> ${esc(t.phone)}<br>`:''}
      ${t.address?`<b>Endereço:</b> ${esc(t.address)}${t.cep?' · CEP '+esc(t.cep):''}`:''}</div>`;
  }
  if(on('exVac') && pet.vaccines.length){
    const rows = pet.vaccines.map(v=>`<tr><td style="padding:6px">${esc(v.name)}</td><td style="padding:6px">${v.applied?fmtDate(v.applied):'—'}</td><td style="padding:6px">${v.status==='programada'?fmtDate(v.due):'—'}</td><td style="padding:6px">${esc(v.lot||'—')}</td></tr>`).join('');
    body += H('💉 Carteira de Vacinação') + TBL(`<tr style="background:#EDF8F7">${th('Vacina')}${th('Aplicada')}${th('Próxima')}${th('Lote')}</tr>${rows}`);
  }
  if(on('exMed')){
    const rows = pet.medications.filter(m=>m.active).map(m=>`<tr><td style="padding:6px">${esc(m.name)}</td><td style="padding:6px">${esc(m.dosage)}</td><td style="padding:6px">${esc(m.freq)}</td><td style="padding:6px">${m.time}</td></tr>`).join('');
    if(rows) body += H('💊 Medicações Contínuas') + TBL(`<tr style="background:#EDF8F7">${th('Medicamento')}${th('Dosagem')}${th('Frequência')}${th('Horário')}</tr>${rows}`);
  }
  if(on('exAppt')){
    const rows = pet.appointments.sort((a,b)=>b.date.localeCompare(a.date)).map(a=>`<tr><td style="padding:6px">${esc(a.title)}${a.resumo?' · '+esc(a.resumo):''}</td><td style="padding:6px">${fmtDate(a.date)}</td><td style="padding:6px">${esc((a.record||'—').slice(0,140))}</td></tr>`).join('');
    if(rows) body += H('🩺 Histórico de Atendimentos') + TBL(`<tr style="background:#EDF8F7">${th('Atendimento')}${th('Data')}${th('Prontuário (resumo)')}</tr>${rows}`);
  }
  if(on('exPeso') && pet.weightHistory?.length){
    const rows = [...pet.weightHistory].sort((a,b)=>(b.date||'').localeCompare(a.date||'')).map(w=>`<tr><td style="padding:6px">${fmtDate(w.date)}</td><td style="padding:6px">${w.weight ?? w.w} kg</td></tr>`).join('');
    body += H('⚖️ Histórico de Peso') + TBL(`<tr style="background:#EDF8F7">${th('Data')}${th('Peso')}</tr>${rows}`);
  }
  closeSheet();
  printShell('Ficha — '+pet.name, body + signatureHTML(todayISO()));
}

function downloadICS(petId, apptId){
  const pet = DB.pets.find(p=>p.id===petId);
  const a = pet.appointments.find(x=>x.id===apptId);
  const dt = a.date.replace(/-/g,'') + 'T' + (a.time||'10:00').replace(':','') + '00';
  const ics = ['BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//VetFlowCare//PT','BEGIN:VEVENT',
    `UID:${a.id}@vetflowcare`,`DTSTART:${dt}`,
    `SUMMARY:🐾 ${a.title} — ${pet.name}`,
    `DESCRIPTION:VetFlowCare${tutorName(pet)?' · Tutor: '+tutorName(pet):''}`,
    a.clinic?`LOCATION:${a.clinic}`:'',
    'BEGIN:VALARM','TRIGGER:-PT24H','ACTION:DISPLAY','DESCRIPTION:Consulta amanhã','END:VALARM',
    'BEGIN:VALARM','TRIGGER:-PT2H','ACTION:DISPLAY','DESCRIPTION:Consulta em 2 horas','END:VALARM',
    'END:VEVENT','END:VCALENDAR'].filter(Boolean).join('\r\n');
  const blob = new Blob([ics], {type:'text/calendar'});
  const link = document.createElement('a');
  link.href = URL.createObjectURL(blob);
  link.download = `consulta_${pet.name}.ics`;
  link.click(); toast('📅 Abra o arquivo para adicionar ao calendário');
}

function activeAlertDays(){
  const d = [];
  if(DB.settings.alert7) d.push(7);
  if(DB.settings.alert3) d.push(3);
  if(DB.settings.alert1) d.push(1);
  return d.length ? d : [3];
}
function requestNotifPermission(){
  if('Notification' in window && Notification.permission === 'default'){
    Notification.requestPermission();
  }
}
function notify(title, body){
  if('Notification' in window && Notification.permission === 'granted'){
    try{ new Notification(title, {body, icon:'logo.jpg', badge:'logo.jpg'}); }catch(e){}
  }
}
function scheduleLocalCheck(){
  const key = 'vfc4_lastcheck';
  if(localStorage.getItem(key) === todayISO()) return;
  localStorage.setItem(key, todayISO());
  const days = activeAlertDays();
  const s = DB.settings;
  const typeOn = {vaccine:s.nVac, medication:s.nMed, vet:s.nVet, pay:true};
  allEvents().forEach(e => {
    if(!typeOn[e.type]) return;
    const t = TYPE_CFG[e.type];
    if(e.daysLeft < 0 && e.type !== 'medication'){
      notify(`⚠ ${t.label} vencida — ${e.pet}`, `${e.title} está ${Math.abs(e.daysLeft)} dias em atraso!`);
    } else if(days.includes(e.daysLeft)){
      notify(`${t.emo} ${t.label} em ${e.daysLeft} ${e.daysLeft===1?'dia':'dias'} — ${e.pet}`,
        `${e.title} vence em ${fmtDate(e.due)}.`);
    } else if(e.daysLeft === 0 && e.type === 'medication'){
      notify(`💊 Medicação — ${e.pet}`, e.title + '. Marque como "Dado" após administrar.');
    }
  });
}

    navigator.serviceWorker.getRegistrations().then(regs => {

    reg.addEventListener('updatefound', () => {
      const nw = reg.installing;

        if(nw.state === 'installed' && navigator.serviceWorker.controller)
          toast('🔄 Nova versão disponível! Feche e reabra o app.');

        style="width:100%;background:var(--primary,#2DC0AE);color:#fff;padding:15px;border-radius:14px;font-size:15px;font-weight:800;border:none">✓ Aceitar e Continuar</button>
    </div></div>`;
  document.body.appendChild(div);
}
function maskCode(el){
  let v = el.value.toUpperCase().replace(/[^A-Z0-9]/g,'');
  if(v.startsWith('VFC')) v = v.slice(3);
  if(!v){ el.value = ''; return; }
  let out = 'VFC-' + v.slice(0,4);
  if(v.length > 4) out += '-' + v.slice(4,8);
  el.value = out;
}

    <div style="width:100%;max-width:340px;display:flex;flex-direction:column;gap:9px">
      <input id="regEmail" type="email" placeholder="Seu e-mail" autocomplete="email"
        style="width:100%;box-sizing:border-box;padding:13px;border-radius:13px;border:none;font-size:15px">
      <div class="pwwrap"><input id="regPass" type="password" placeholder="Crie uma senha (mín. 6)" autocomplete="new-password"
        style="padding:13px;border-radius:13px;border:none;font-size:15px">
        <button type="button" class="eye" onclick="togglePw('regPass',this)">👁</button></div>
      <div class="pwwrap"><input id="regPass2" type="password" placeholder="Confirme a senha" autocomplete="new-password"
        style="padding:13px;border-radius:13px;border:none;font-size:15px">

    <div id="regErr" style="color:#FF8C69;font-size:13px;font-weight:700;min-height:18px;margin-top:8px"></div>
    <div style="color:rgba(255,255,255,.5);font-size:11px;max-width:320px;line-height:1.6">
      🔐 Seus dados ficam criptografados (AES-256) neste aparelho.<br>
      ⚠️ Guarde bem a senha — sem ela os dados não podem ser recuperados.</div>
    <div class="sub" style="margin-top:14px">B&G Systems · Gestão veterinária completa</div>`;
}
async function doEntryRegister(){
  const err = document.getElementById('regErr');
  err.textContent = '';
  const needInvite = BETA_GATE && !localStorage.getItem('vfc_invite');
  if(needInvite){
    const code = document.getElementById('regInvite').value;
    if(!inviteCheck(code)){
      err.textContent = '⚠ Convite inválido — confira com a equipe VetFlowCare';
      return;
    }
    localStorage.setItem('vfc_invite', JSON.stringify({code:code.toUpperCase().trim(), at:new Date().toISOString()}));
    gcEvent('convite-validado');
  }
  const ok = await createAccountCore(
    (document.getElementById('regEmail').value||'').trim(),
    document.getElementById('regPass').value,
    document.getElementById('regPass2').value);
  if(!ok) return;
  toast('✅ Acesso criado! Bem-vindo(a) ao VetFlowCare 🐾');
  enterApp();
}
function afterLGPD(){
  if(getAuth()){
    if(window._LOCKED){ showLockScreen(); } else { bootApp(); }
  } else {
    showEntryRegister();
  }
}
if(!localStorage.getItem('vfc_lgpd')){
  showLGPD();
} else {
  afterLGPD();
}
